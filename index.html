<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<meta name="description" content="Multiview — reżyserka: wiele podglądów wideo (YouTube, Twitch, Kick, Spotify, Apple Music) na jednym ekranie, z układami, timerami i sterowaniem audio.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Multiview</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230a0c10'/%3E%3Crect x='4' y='5' width='7' height='6' rx='1' fill='%23ff2d21'/%3E%3Crect x='13' y='5' width='7' height='6' rx='1' fill='%2346c26a'/%3E%3Crect x='4' y='13' width='7' height='6' rx='1' fill='%23e0a33a'/%3E%3Crect x='13' y='13' width='7' height='6' rx='1' fill='%2335b9d6'/%3E%3C/svg%3E">
<!-- Lucide (ISC) — przy braku sieci wchodzi zestaw awaryjny w app.js -->
<script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js" defer></script>
<style>
  :root{
    --bg:#0a0c10;
    --panel:#12161d;
    --panel-2:#1a1f28;
    --panel-3:#222834;
    --line:#242b36;
    --line-bright:#333c49;
    --text:#c3cad6;
    --text-dim:#78828f;
    --text-bright:#f2f5fa;
    --pgm:#ff2d21;      /* program / sceny główne  */
    --pvw:#46c26a;      /* preview / secondary     */
    --aux:#e0a33a;      /* studia                  */
    --signal:#35b9d6;   /* interakcja              */
    --signal-dim:rgba(53,185,214,.14);
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  button{font-family:inherit}

  /* ============ HEADER ============ */
  .header{
    flex:0 0 auto;display:flex;align-items:stretch;gap:1px;
    background:var(--line);border-bottom:1px solid var(--line);
  }
  .h-cell{background:var(--panel);display:flex;align-items:center}
  .brand{
    padding:0 20px;gap:11px;
    font-family:var(--mono);font-size:13px;letter-spacing:.26em;
    color:var(--text-bright);text-transform:uppercase;font-weight:600;
  }
  .brand .rec{
    width:8px;height:8px;border-radius:50%;background:var(--pgm);
    animation:pulse 2.4s ease-out infinite;
  }
  .clock{padding:9px 22px;gap:22px;flex:0 0 auto}
  .clock .time{
    font-family:var(--mono);font-variant-numeric:tabular-nums;
    font-size:30px;font-weight:600;letter-spacing:.02em;color:var(--text-bright);
    line-height:1;display:flex;align-items:baseline;gap:3px;
  }
  .clock .time .sec{font-size:19px;color:var(--signal)}
  .clock .meta{display:flex;flex-direction:column;gap:3px}
  .clock .date{
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    color:var(--text);text-transform:uppercase;
  }
  .clock .session{
    font-family:var(--mono);font-size:10px;letter-spacing:.14em;
    color:var(--text-dim);text-transform:uppercase;display:flex;gap:7px;align-items:center;
  }
  .clock .session b{color:var(--pgm);font-weight:600}
  .clock .session .dot{width:5px;height:5px;border-radius:50%;background:var(--pgm)}

  .spacer{flex:1;background:var(--panel)}
  .h-actions{padding:0 12px;gap:8px}

  .btn{
    font-size:12.5px;font-weight:500;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line-bright);border-radius:6px;
    padding:8px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
    transition:border-color .12s,color .12s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--signal);color:var(--text-bright)}
  .btn svg{width:15px;height:15px;flex:0 0 auto}
  .langseg{display:flex;border:1px solid var(--line-bright);border-radius:6px;overflow:hidden;margin-right:2px}
  .langseg button{font-family:var(--mono);font-size:11px;letter-spacing:.06em;background:transparent;
    color:var(--text-dim);border:0;padding:8px 10px;cursor:pointer;border-right:1px solid var(--line)}
  .langseg button:last-child{border-right:0}
  .langseg button:hover{color:var(--text);background:var(--panel-2)}
  .langseg button[aria-pressed="true"]{background:var(--signal-dim);color:var(--signal)}
  .credit{flex:0 0 auto;padding:12px 18px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--text-dim);text-align:center}

  /* ============ WALL ============ */
  .wall-wrap{flex:1;min-height:0;background:#06080b;padding:0;overflow:hidden}
  .wall{display:grid;gap:0;height:100%;width:100%}
  .wall.preset{
    grid-template-columns:1fr 1fr minmax(220px,.62fr);
    grid-template-rows:repeat(6,1fr);
    grid-template-areas:
      "s1 s2 sec1"
      "s1 s2 sec1"
      "s1 s2 sec2"
      "s3 s4 sec2"
      "s3 s4 sec3"
      "s3 s4 sec3";
  }
  .area-s1{grid-area:s1}.area-s2{grid-area:s2}
  .area-s3{grid-area:s3}.area-s4{grid-area:s4}
  .area-sec1{grid-area:sec1}.area-sec2{grid-area:sec2}.area-sec3{grid-area:sec3}

  .tile{
    position:relative;background:#000;overflow:hidden;min-height:0;min-width:0;
    display:flex;flex-direction:column;border:1.5px solid #2a2f3a;
  }
  .tile.t-main{border-color:var(--pgm)}
  .tile.t-secondary{border-color:var(--pvw)}
  .tile.t-studio{border-color:var(--aux)}
  .tile iframe{flex:1;width:100%;height:100%;border:0;background:#000;display:block}
  .tile.fill iframe{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    aspect-ratio:16/9;width:100%;height:auto;min-width:100%;min-height:100%;flex:none;
  }

  .ph{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;background:repeating-linear-gradient(45deg,#0e1116 0 12px,#0b0e12 12px 24px);
    color:var(--text-dim);text-align:center;padding:14px;
  }
  .ph .big{font-family:var(--mono);font-size:13px;letter-spacing:.1em;color:#5b6675}
  .ph .small{font-size:11px;max-width:200px;line-height:1.4}
  .tile.off{border-top-color:transparent}
  .tile.off .ph{background:#0a0c10}
  .tile.off .big{color:#3a424e}

  .strip{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;align-items:center;gap:9px;padding:6px 9px;
    background:linear-gradient(0deg,rgba(4,6,9,.9) 0%,rgba(4,6,9,0) 100%);pointer-events:none;
  }
  .tally{display:inline-flex;align-items:center;gap:5px;flex:0 0 auto;
    font-family:var(--mono);font-size:9px;letter-spacing:.14em;font-weight:700;}
  .tally .dot{width:7px;height:7px;border-radius:2px}
  .t-main .tally{color:var(--pgm)} .t-main .tally .dot{background:var(--pgm);box-shadow:0 0 7px rgba(255,45,33,.7)}
  .t-secondary .tally{color:var(--pvw)} .t-secondary .tally .dot{background:var(--pvw);box-shadow:0 0 7px rgba(70,194,106,.6)}
  .t-studio .tally{color:var(--aux)} .t-studio .tally .dot{background:var(--aux);box-shadow:0 0 7px rgba(224,163,58,.6)}
  .strip .name{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--text-bright);
    text-shadow:0 1px 3px rgba(0,0,0,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .strip .idx{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-left:auto;flex:0 0 auto}

  .tctl{position:absolute;top:7px;right:7px;z-index:3;display:flex;gap:3px;opacity:0;transition:opacity .13s}
  .tile:hover .tctl{opacity:1}
  .tctl button{background:rgba(6,8,11,.75);border:1px solid var(--line-bright);border-radius:5px;
    color:var(--text-dim);cursor:pointer;padding:5px;line-height:0}
  .tctl button:hover{color:var(--signal);border-color:var(--signal)}
  .tctl button.active{color:var(--signal);border-color:var(--signal);background:var(--signal-dim)}
  .tctl svg{width:14px;height:14px}

  /* ============ DRAWERS ============ */
  .scrim{position:fixed;inset:0;background:rgba(4,6,9,.55);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .18s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100dvh;width:min(440px,94vw);
    background:var(--panel);border-left:1px solid var(--line-bright);z-index:50;
    transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column}
  .drawer.wide{width:min(1200px,97vw)}
  .drawer.show{transform:translateX(0)}
  .drawer-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .drawer-head h2{margin:0;font-family:var(--mono);font-size:13px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--text-bright);font-weight:600;flex:1}
  .xbtn{background:transparent;border:0;color:var(--text-dim);cursor:pointer;padding:6px;line-height:0;border-radius:5px}
  .xbtn:hover{color:var(--text-bright);background:var(--panel-2)}
  .xbtn svg{width:18px;height:18px}
  .drawer-body{flex:1;overflow-y:auto;padding:16px 18px}
  .drawer-foot{flex:0 0 auto;display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}

  .group-label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--text-dim);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .group-label:first-child{margin-top:0}
  .group-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .group-label .tag{width:8px;height:8px;border-radius:2px}
  .tag.main{background:var(--pgm)} .tag.secondary{background:var(--pvw)} .tag.studio{background:var(--aux)}

  .src{display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:7px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px}
  .src.disabled{opacity:.5}
  .src-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .src input{background:var(--bg);border:1px solid var(--line-bright);border-radius:5px;
    color:var(--text-bright);padding:6px 9px;font-family:var(--sans);font-size:12.5px;outline:none;width:100%}
  .src input.url{font-family:var(--mono);font-size:11px;color:var(--text)}
  .src input:focus{border-color:var(--signal)}
  .src input.name{font-weight:600}
  .src .del{background:transparent;border:1px solid transparent;color:var(--pgm);cursor:pointer;padding:6px;line-height:0;border-radius:6px;flex:0 0 auto;margin-left:4px;opacity:.75}
  .src .del:hover{opacity:1;color:#fff;background:var(--pgm);border-color:var(--pgm)}
  .src .del svg{width:15px;height:15px}

  .switch{position:relative;width:38px;height:22px;flex:0 0 auto;cursor:pointer}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .switch .track{position:absolute;inset:0;background:var(--panel-3);border:1px solid var(--line-bright);
    border-radius:22px;transition:background .15s,border-color .15s}
  .switch .thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;
    background:var(--text-dim);transition:transform .15s,background .15s}
  .switch input:checked + .track{background:var(--signal-dim);border-color:var(--signal)}
  .switch input:checked + .track + .thumb{transform:translateX(16px);background:var(--signal)}
  .switch input:focus-visible + .track{outline:2px solid var(--signal);outline-offset:2px}

  .note{display:flex;gap:9px;margin-top:16px;padding:11px 12px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:7px;font-size:12px;color:var(--text-dim);line-height:1.5}
  .note svg{flex:0 0 auto;width:15px;height:15px;color:var(--signal);margin-top:1px}
  .note b{color:var(--text)}

  .btn-primary{font-size:13.5px;font-weight:600;background:var(--signal);color:#042630;border:0;
    border-radius:7px;padding:11px 18px;cursor:pointer;transition:filter .12s;flex:1}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-ghost{font-size:13px;background:transparent;border:1px solid var(--line-bright);color:var(--text);
    border-radius:7px;padding:11px 16px;cursor:pointer}
  .btn-ghost:hover{border-color:var(--signal);color:var(--text-bright)}
  .btn-danger{font-size:13px;background:transparent;border:1px solid rgba(255,45,33,.5);color:var(--pgm);
    border-radius:7px;padding:11px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn-danger:hover{background:rgba(255,45,33,.1);border-color:var(--pgm)}
  .btn-danger svg{width:15px;height:15px}
  .btn-add{font-size:13px;font-weight:600;background:var(--signal);color:#042630;border:0;
    border-radius:7px;padding:11px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;flex:1}
  .btn-add:hover{filter:brightness(1.08)}
  .settings-sep{height:1px;background:var(--line);margin:20px 0 14px}

  .presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .preset-btn{flex:1;min-width:130px;text-align:left;background:var(--panel-2);
    border:1px solid var(--line-bright);border-radius:8px;padding:12px 13px;cursor:pointer;
    color:var(--text);transition:border-color .12s}
  .preset-btn:hover{border-color:var(--signal)}
  .preset-btn[aria-pressed="true"]{border-color:var(--signal);background:var(--signal-dim)}
  .preset-btn .pt{font-size:13px;font-weight:600;color:var(--text-bright);margin-bottom:3px}
  .preset-btn .pd{font-size:11.5px;color:var(--text-dim);line-height:1.4}

  .steppers{display:flex;gap:18px;margin-bottom:16px}
  .size-toggle{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);
    border:1px solid var(--line-bright);color:var(--text);border-radius:7px;padding:9px 14px;
    font-size:12.5px;font-weight:500;cursor:pointer;margin-bottom:16px}
  .size-toggle:hover{border-color:var(--signal);color:var(--text-bright)}
  .size-toggle[aria-expanded="true"]{border-color:var(--signal);background:var(--signal-dim);color:var(--text-bright)}
  .size-toggle svg{width:15px;height:15px}
  .size-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:11px 13px;
    background:var(--panel-2);border:1px solid var(--signal);border-radius:8px}
  .size-bar .sel-name{font-size:13px;font-weight:600;color:var(--text-bright);display:flex;align-items:center;gap:8px}
  .size-bar .sel-name .cdot{width:9px;height:9px;border-radius:2px}
  .size-bar .hint{font-size:12px;color:var(--text-dim)}
  .size-bar .grp{display:flex;align-items:center;gap:7px;margin-left:auto}
  .size-bar .grp+.grp{margin-left:0}
  .size-bar .sz-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--text-dim)}
  .size-bar b{font-family:var(--mono);font-size:14px;color:var(--text-bright);min-width:16px;text-align:center}
  .size-bar button{width:28px;height:28px;background:var(--panel-3);border:1px solid var(--line-bright);
    border-radius:6px;color:var(--text);cursor:pointer;font-size:15px;line-height:1}
  .size-bar button:hover{border-color:var(--signal);color:var(--signal)}
  .cell.selected{outline:2px solid var(--signal);outline-offset:-2px;box-shadow:0 0 0 3px var(--signal-dim)}
  .cell.pickable{cursor:pointer}
  .stepper{display:flex;align-items:center;gap:10px}
  .stepper .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
  .stepper .val{font-family:var(--mono);font-size:16px;color:var(--text-bright);min-width:18px;text-align:center}
  .stepper button{width:28px;height:28px;background:var(--panel-2);border:1px solid var(--line-bright);
    border-radius:6px;color:var(--text);cursor:pointer;font-size:16px;line-height:1}
  .stepper button:hover{border-color:var(--signal);color:var(--signal)}

  .editor-grid{display:grid;gap:6px;margin-bottom:18px;aspect-ratio:16/9;min-height:min(58vh,540px);
    background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px}
  .cell{background:var(--panel-2);border:1.5px dashed var(--line-bright);border-radius:6px;
    display:flex;align-items:center;justify-content:center;position:relative;
    min-height:0;overflow:hidden;transition:border-color .12s,background .12s}
  .cell.filled{border-style:solid}
  .cell.filled.f-main{border-color:var(--pgm)}
  .cell.filled.f-secondary{border-color:var(--pvw)}
  .cell.filled.f-studio{border-color:var(--aux)}
  .cell.dragover{border-color:var(--signal);background:var(--signal-dim)}
  .cell .cname{font-size:11px;font-weight:600;color:var(--text-bright);text-align:center;padding:4px;line-height:1.2;cursor:grab}
  .cell .empty-hint{font-family:var(--mono);font-size:9px;color:#4a5361;letter-spacing:.08em}
  .cell.filled{flex-direction:column;gap:5px;padding:5px;cursor:grab}
  .cell-name{font-size:11px;font-weight:600;color:var(--text-bright);text-align:center;line-height:1.15}
  .size-ctl{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:10px;color:var(--text-dim)}
  .size-ctl .sz-lbl{margin-left:5px;letter-spacing:.06em}
  .size-ctl .sz-lbl:first-child{margin-left:0}
  .size-ctl button{width:18px;height:18px;background:var(--panel-3);border:1px solid var(--line-bright);
    border-radius:4px;color:var(--text);cursor:pointer;font-size:13px;line-height:1;padding:0}
  .size-ctl button:hover{border-color:var(--signal);color:var(--signal)}
  .size-ctl b{color:var(--text-bright);min-width:11px;text-align:center;font-weight:600}
  .cell .clear{position:absolute;top:3px;right:3px;background:rgba(6,8,11,.7);border:0;border-radius:4px;
    color:var(--text-dim);cursor:pointer;padding:2px;line-height:0}
  .cell .clear:hover{color:var(--pgm)}
  .cell .clear svg{width:12px;height:12px}

  .palette-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:9px}
  .palette{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;background:var(--panel-2);
    border:1px solid var(--line-bright);border-radius:6px;font-size:12px;font-weight:500;color:var(--text);cursor:grab;user-select:none}
  .chip:active{cursor:grabbing}
  .chip.used{opacity:.4}
  .chip .cdot{width:8px;height:8px;border-radius:2px;flex:0 0 auto}
  .chip .cdot.main{background:var(--pgm)}.chip .cdot.secondary{background:var(--pvw)}.chip .cdot.studio{background:var(--aux)}
  .palette-empty{font-size:12px;color:var(--text-dim);padding:8px 0}

  /* audio solo panel */
  .audiobar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:45;
    background:var(--panel);border:1px solid var(--line-bright);border-radius:12px;
    padding:12px 14px;display:flex;flex-direction:column;gap:10px;
    box-shadow:0 12px 44px rgba(0,0,0,.55);max-width:min(780px,94vw)}
  .ab-head{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim)}
  .ab-head b{color:var(--text-bright)}
  .ab-x{margin-left:auto;background:transparent;border:0;color:var(--text-dim);cursor:pointer;padding:2px;line-height:0}
  .ab-x:hover{color:var(--text-bright)} .ab-x svg{width:16px;height:16px}
  .ab-list{display:flex;flex-wrap:wrap;gap:7px}
  .ab-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;background:var(--panel-2);
    border:1px solid var(--line-bright);border-radius:8px;color:var(--text);font-size:12.5px;font-weight:500;cursor:pointer}
  .ab-pill:hover{border-color:var(--signal)}
  .ab-pill .dot{width:8px;height:8px;border-radius:2px;background:var(--text-dim)}
  .ab-pill.t-main .dot{background:var(--pgm)}.ab-pill.t-secondary .dot{background:var(--pvw)}.ab-pill.t-studio .dot{background:var(--aux)}
  .ab-pill.on{border-color:var(--signal);background:var(--signal-dim);color:var(--text-bright)}
  .ab-pill.on .dot{background:var(--signal);box-shadow:0 0 8px var(--signal)}
  .ab-foot{display:flex;align-items:center;gap:12px}
  .ab-hint{font-size:11px;color:var(--text-dim);line-height:1.4;flex:1}
  .ab-mute{background:var(--panel-3);border:1px solid var(--line-bright);color:var(--text);
    border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
  .ab-mute:hover{border-color:var(--signal);color:var(--text-bright)}
  /* audio-live marker on tile */
  .strip .aud{display:none;font-family:var(--mono);font-size:9px;letter-spacing:.14em;font-weight:700;
    color:var(--signal);align-items:center;gap:4px;flex:0 0 auto}
  .strip .aud::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--signal);box-shadow:0 0 7px var(--signal)}
  .tile.audio-live .strip .aud{display:inline-flex}
  .tile.audio-live{outline:2px solid var(--signal);outline-offset:-2px}

  /* settings lock */
  .lockbar{display:flex;align-items:center;gap:9px;padding:10px 12px;margin-bottom:16px;border-radius:8px;
    background:var(--panel-2);border:1px solid var(--line-bright);font-size:12.5px;color:var(--text)}
  .lockbar svg{width:16px;height:16px;color:var(--aux);flex:0 0 auto}
  .lockbar.open svg{color:var(--pvw)}
  .lockbar button{margin-left:auto;background:var(--panel-3);border:1px solid var(--line-bright);
    color:var(--text-bright);border-radius:6px;padding:6px 13px;font-size:12px;cursor:pointer;white-space:nowrap}
  .lockbar button:hover{border-color:var(--signal)}
  .src input:disabled{opacity:.5;cursor:not-allowed}

  /* premium intro */
  #intro{position:fixed;inset:0;z-index:200;background:
    radial-gradient(120% 120% at 50% 40%, #10151d 0%, #06080b 60%, #04060a 100%);
    display:flex;align-items:center;justify-content:center;
    animation:introOut .7s cubic-bezier(.4,0,.2,1) 2s forwards;}
  #intro.gone{display:none}
  .intro-inner{display:flex;flex-direction:column;align-items:center;gap:18px;
    animation:introIn 1s cubic-bezier(.2,.7,.2,1) both;}
  .intro-logo{position:relative;font-family:var(--mono);font-size:clamp(24px,5vw,44px);
    letter-spacing:.42em;font-weight:600;color:var(--text-bright);text-transform:uppercase;
    padding-left:.42em;display:flex;align-items:center;gap:.5em;overflow:hidden;}
  .intro-logo::after{content:"";position:absolute;inset:0;
    background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.65) 50%,transparent 70%);
    transform:translateX(-120%);animation:introShine 1.4s ease .5s 1 forwards;}
  .intro-dot{width:.5em;height:.5em;border-radius:50%;background:var(--pgm);
    box-shadow:0 0 18px var(--pgm);animation:pulse 1.6s ease-out infinite;}
  .intro-line{width:0;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--pgm),var(--signal),var(--pvw));
    animation:introLine 1.1s cubic-bezier(.4,0,.2,1) .35s both;}
  @keyframes introIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes introOut{to{opacity:0;visibility:hidden}}
  @keyframes introShine{to{transform:translateX(120%)}}
  @keyframes introLine{from{width:0;opacity:0}to{width:min(340px,64vw);opacity:1}}
  body.with-intro .wall-wrap,body.with-intro .header,body.with-intro .page-foot{animation:appReveal .8s ease 1.9s both;}
  @keyframes appReveal{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    #intro{animation:introOut .3s ease 1s forwards}
    .intro-inner,.intro-logo::after,.intro-line,.wall-wrap,.header,.page-foot{animation:none}
  }

  /* footer */
  .page-foot{flex:0 0 auto;text-align:center;padding:5px 12px;
    background:var(--panel);border-top:1px solid var(--line);
    font-size:10px;letter-spacing:.06em;color:var(--text-dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;}

  /* demo tiles */
  .demo-tile{background:#0b0e13}
  .demo-tile::before{content:"";position:absolute;inset:0;z-index:0;
    background:radial-gradient(90% 90% at 30% 25%, var(--dc), transparent 62%);opacity:.35}
  .demo-body{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;color:var(--dc)}
  .demo-play{width:min(26%,50px);height:auto;opacity:.9;filter:drop-shadow(0 0 14px var(--dc))}
  .demo-name{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--text-bright);text-shadow:0 1px 5px rgba(0,0,0,.7)}

  /* empty state */
  .empty-state{display:flex;align-items:center;justify-content:center;background:#06080b}
  /* per-stream border color picker */
  .clr-pick{position:relative;width:26px;height:26px;flex:0 0 auto;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--line-bright)}
  .clr-pick input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:0;padding:0;margin:0;cursor:pointer;opacity:0}
  .clr-swatch{position:absolute;inset:0;pointer-events:none}
  /* demo placeholders */
  .demo-ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}
  .demo-ph::after{content:"";position:absolute;inset:0;background-image:
    repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0 2px,transparent 2px 22px);pointer-events:none}
  .demo-badge{font-family:var(--mono);font-size:10px;letter-spacing:.28em;font-weight:700;opacity:.9}
  .demo-name{font-family:var(--sans);font-size:clamp(13px,2.4vw,22px);font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.6);text-align:center;padding:0 10px}
  .es-inner{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:24px;max-width:420px}
  .es-inner svg{width:44px;height:44px;color:var(--line-bright)}
  .es-title{font-family:var(--mono);font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-bright)}
  .es-sub{font-size:13px;color:var(--text-dim);line-height:1.5}
  .es-btn{margin-top:6px;font-size:13.5px;font-weight:600;background:var(--signal);color:#042630;
    border:0;border-radius:8px;padding:11px 20px;cursor:pointer}
  .es-btn:hover{filter:brightness(1.08)}

  /* edycja układu na widoku głównym */
  .wall.editing .tile,.wall.editing .ew-empty{cursor:default}
  .ew-tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;overflow:hidden}
  .ew-tile .ew-name{font-family:var(--sans);font-size:clamp(12px,2vw,18px);font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.7);cursor:grab;user-select:none;padding:0 8px;text-align:center}
  .ew-tile .ew-name:active{cursor:grabbing}
  .ew-ctl{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center;
    background:rgba(6,8,11,.72);border:1px solid var(--line-bright);border-radius:8px;padding:5px 7px}
  .ew-ctl .ew-lbl{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.1em}
  .ew-ctl b{font-family:var(--mono);font-size:12px;color:#fff;min-width:12px;text-align:center}
  .ew-ctl button{width:24px;height:24px;background:var(--panel-2);border:1px solid var(--line-bright);
    border-radius:5px;color:var(--text);cursor:pointer;font-size:13px;line-height:1}
  .ew-ctl button:hover{border-color:var(--signal);color:var(--signal)}
  .ew-ctl .ew-del{color:var(--pgm);font-size:12px}
  .ew-ctl .ew-del:hover{background:var(--pgm);color:#fff;border-color:var(--pgm)}
  .ew-empty{background:repeating-linear-gradient(45deg,#0d1016 0 10px,#0a0d12 10px 20px);
    border:1.5px dashed var(--line-bright)!important;display:flex;align-items:center;justify-content:center}
  .ew-empty .ew-hint{font-family:var(--mono);font-size:11px;color:#4a5361;letter-spacing:.1em}
  .tile.dragover,.ew-empty.dragover{outline:2px solid var(--signal);outline-offset:-2px}
  .ewbar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:60;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;max-width:96vw;
    background:var(--panel);border:1px solid var(--line-bright);border-radius:12px;
    padding:11px 15px;box-shadow:0 12px 44px rgba(0,0,0,.55)}
  .ewbar .grp{display:flex;align-items:center;gap:7px}
  .ewbar .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
  .ewbar .val{font-family:var(--mono);font-size:14px;color:var(--text-bright);min-width:16px;text-align:center}
  .ewbar button.st{width:28px;height:28px;background:var(--panel-2);border:1px solid var(--line-bright);border-radius:6px;color:var(--text);cursor:pointer;font-size:15px;line-height:1}
  .ewbar button.st:hover{border-color:var(--signal);color:var(--signal)}
  .ewbar .ewpal{display:flex;gap:6px;flex-wrap:wrap;max-width:44vw}
  .ewbar .ewchip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--panel-2);
    border:1px solid var(--line-bright);border-radius:6px;font-size:12px;color:var(--text);cursor:grab}
  .ewbar .ewchip .cd{width:8px;height:8px;border-radius:2px}
  .ewbar .done{font-size:13px;font-weight:600;background:var(--signal);color:#042630;border:0;border-radius:7px;padding:9px 16px;cursor:pointer}
  .ewbar .done:hover{filter:brightness(1.08)}

  [hidden]{display:none!important}
  /* timery */
  .tmr-tile{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(4px,1.4vh,12px);text-align:center;padding:8px}
  .tmr-name{font-family:var(--sans);font-size:clamp(11px,1.6vw,16px);font-weight:600;color:var(--text);letter-spacing:.02em}
  .tmr-time{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;
    font-size:clamp(28px,9vw,84px);line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .tmr-time.done{animation:tmrBlink 1s steps(2,start) infinite}
  @keyframes tmrBlink{50%{opacity:.25}}
  .tmr-sub{font-family:var(--mono);font-size:clamp(10px,1.3vw,14px);color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
  .tmr-ctl{display:flex;gap:7px}
  .tmr-ctl button{font-family:var(--sans);font-size:12px;font-weight:600;background:rgba(6,8,11,.7);
    border:1px solid var(--line-bright);border-radius:7px;color:var(--text);cursor:pointer;padding:7px 14px}
  .tmr-ctl button:hover{border-color:var(--signal);color:#fff}
  .tmr-fields{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tmr-hms{display:flex;align-items:center;gap:3px}
  .tmr-hms input{width:44px;background:var(--bg);border:1px solid var(--line-bright);border-radius:5px;
    color:var(--text-bright);padding:6px 4px;font-family:var(--mono);font-size:13px;outline:none;text-align:center;-moz-appearance:textfield}
  .tmr-hms input::-webkit-outer-spin-button,.tmr-hms input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .tmr-hms input:focus{border-color:var(--signal)}
  .tmr-hms span{color:var(--text-dim);font-family:var(--mono)}
  .seg.tmr-mode{display:flex;border:1px solid var(--line-bright);border-radius:6px;overflow:hidden}
  .seg.tmr-mode button{font-size:11px;background:transparent;color:var(--text-dim);border:0;padding:6px 10px;cursor:pointer;border-right:1px solid var(--line)}
  .seg.tmr-mode button:last-child{border-right:0}
  .seg.tmr-mode button[aria-pressed="true"]{background:var(--signal-dim);color:var(--signal)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,45,33,.5)}70%{box-shadow:0 0 0 6px rgba(255,45,33,0)}100%{box-shadow:0 0 0 0 rgba(255,45,33,0)}}
  @media (prefers-reduced-motion:reduce){.brand .rec{animation:none}}

  @media (max-width:820px){
    .clock .time{font-size:22px}.clock{padding:8px 14px;gap:14px}
    .clock .meta{display:none}
    .wall.preset{grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);
      grid-template-areas:"s1 s2" "s3 s4" "sec1 sec2" "sec3 sec3";}
    .brand{padding:0 12px;font-size:11px}
  }

  /* ============ IKONY ============ */
  [data-lucide],svg.lucide{display:inline-block;vertical-align:middle;flex:0 0 auto;
    width:16px;height:16px;stroke-width:2;stroke:currentColor;fill:none}
  .ico-sm[data-lucide],svg.ico-sm{width:14px;height:14px}
  .ico-lg[data-lucide],svg.ico-lg{width:20px;height:20px}
  .ico-xl[data-lucide],svg.ico-xl{width:44px;height:44px}
  .btn svg.lucide{width:15px;height:15px}
  .tctl svg.lucide{width:14px;height:14px}
  .xbtn svg.lucide{width:18px;height:18px}

  /* ============ WARSTWA NAKŁADKI ============ */
  .wall-wrap{position:relative}
  .wall-overlay{position:absolute;inset:0;z-index:5;background:#06080b;display:grid}
  .wall-overlay[hidden]{display:none!important}
  .wall.dimmed{visibility:hidden}
  .tile[hidden]{display:none!important}

  /* ============ STATUS KAFELKA (BRAK SYGNAŁU / ŁADOWANIE) ============ */
  .tstatus{position:absolute;inset:0;z-index:4;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;text-align:center;padding:16px;
    background:rgba(6,8,11,.92);color:var(--text-dim);font-size:12px;line-height:1.45}
  .tile.tile-error .tstatus,.tile.tile-loading .tstatus{display:flex}
  .tstatus svg{width:26px;height:26px;color:var(--aux)}
  .tile.tile-loading .tstatus svg{color:var(--signal);animation:spin 1.1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tstatus .ts-title{font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--text)}
  .tstatus .ts-sub{max-width:240px}
  .tstatus button{background:var(--panel-2);border:1px solid var(--line-bright);color:var(--text);
    border-radius:6px;padding:7px 13px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .tstatus button:hover{border-color:var(--signal);color:var(--text-bright)}
  .strip .aud-lvl{font-family:var(--mono);font-size:9px;color:var(--signal);flex:0 0 auto}

  /* ============ GŁOŚNOŚĆ W PANELU AUDIO ============ */
  .ab-vol{display:flex;align-items:center;gap:9px;padding-top:2px}
  .ab-vol input[type=range]{flex:1;accent-color:var(--signal);cursor:pointer;min-width:140px}
  .ab-vol .vv{font-family:var(--mono);font-size:11px;color:var(--text-bright);min-width:34px;text-align:right}
  .ab-note{font-size:11px;color:var(--text-dim);line-height:1.45;display:flex;gap:7px;align-items:flex-start}
  .ab-note svg{width:13px;height:13px;color:var(--aux);margin-top:2px}
  .ab-note[hidden]{display:none!important}
  .ab-pill.no-ctl{opacity:.62}
  .ab-pill.no-ctl.on{opacity:1;border-color:var(--aux);background:rgba(224,163,58,.13)}
  .ab-pill.no-ctl.on .dot{background:var(--aux);box-shadow:0 0 8px var(--aux)}

  /* ============ INSTRUKCJA ============ */
  .help h3{margin:22px 0 8px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--signal);display:flex;align-items:center;gap:8px}
  .help h3:first-child{margin-top:0}
  .help p{margin:0 0 10px;font-size:13px;line-height:1.6;color:var(--text)}
  .help ul{margin:0 0 12px;padding-left:18px}
  .help li{font-size:13px;line-height:1.6;margin-bottom:5px}
  .help b{color:var(--text-bright)}
  .help code{font-family:var(--mono);font-size:11.5px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:var(--signal)}
  .help .hbox{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;margin:0 0 14px;font-size:12.5px;line-height:1.6;color:var(--text-dim)}
  .help .hbox b{color:var(--text)}
  kbd{font-family:var(--mono);font-size:11px;background:var(--panel-3);color:var(--text-bright);
    border:1px solid var(--line-bright);border-bottom-width:2px;border-radius:5px;
    padding:2px 7px;display:inline-block;min-width:22px;text-align:center}
  .keys{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;align-items:center;margin-bottom:14px}
  .keys .kd{font-size:12.5px;color:var(--text)}

  /* ============ EKSPORT / IMPORT / UDOSTĘPNIANIE ============ */
  .io-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .io-row button{flex:1;min-width:132px;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-size:12.5px;background:var(--panel-2);border:1px solid var(--line-bright);color:var(--text);
    border-radius:7px;padding:10px 12px;cursor:pointer}
  .io-row button:hover{border-color:var(--signal);color:var(--text-bright)}

  /* ============ WALIDACJA LINKU ============ */
  .url-hint{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    display:flex;align-items:center;gap:5px;color:var(--text-dim);min-height:14px}
  .url-hint.ok{color:var(--pvw)} .url-hint.warn{color:var(--aux)} .url-hint.bad{color:var(--pgm)}
  .url-hint svg{width:12px;height:12px}

  /* ============ TOAST ============ */
  .toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,14px);z-index:300;
    background:var(--panel);border:1px solid var(--line-bright);border-radius:10px;
    padding:11px 16px;font-size:13px;color:var(--text-bright);display:flex;align-items:center;gap:9px;
    box-shadow:0 12px 40px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .toast svg{color:var(--signal)}
  .toast.bad svg{color:var(--pgm)}

  /* ============ PRZECIĄGANIE PALCEM (TOUCH) ============ */
  .drag-ghost{position:fixed;z-index:400;pointer-events:none;padding:7px 12px;border-radius:7px;
    background:var(--panel);border:1px solid var(--signal);color:var(--text-bright);
    font-size:12.5px;font-weight:600;box-shadow:0 8px 26px rgba(0,0,0,.6);transform:translate(-50%,-140%)}
  .chip,.ewchip,.cname,.ew-name{touch-action:none}

  /* ============ DROBIAZGI ============ */
  .intro-skip{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
    background:transparent;border:0;color:var(--text-dim);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;font-family:var(--mono);cursor:pointer;padding:8px 14px}
  .intro-skip:hover{color:var(--text-bright)}
  .h-actions .btn.on{border-color:var(--signal);color:var(--signal);background:var(--signal-dim)}
  .switch-row{display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:7px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px}
  .switch-row .sr-main{flex:1;min-width:0}
  .switch-row .sr-t{font-size:12.5px;font-weight:600;color:var(--text-bright)}
  .switch-row .sr-d{font-size:11.5px;color:var(--text-dim);line-height:1.4}
  .drag-handle{color:var(--text-dim);cursor:grab;padding:2px;line-height:0}
  .drag-handle:active{cursor:grabbing}
  :focus-visible{outline:2px solid var(--signal);outline-offset:2px}
  @media (max-width:820px){
    .ewbar{gap:9px;padding:9px 11px}
    .ewbar .ewpal{max-width:90vw}
    .drawer.wide{width:100vw}
    .keys{grid-template-columns:1fr;gap:4px 0}
    .keys .kd{margin-bottom:8px}
  }

  /* ============ PRESETY WIDOKU ============ */
  .presetbar{flex:0 0 auto;display:flex;align-items:center;gap:7px;flex-wrap:wrap;
    padding:7px 12px;background:var(--panel);border-bottom:1px solid var(--line)}
  .presetbar[hidden]{display:none!important}
  .pchip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px 6px 7px;
    background:var(--panel-2);border:1px solid var(--line-bright);border-radius:7px;
    color:var(--text);font-size:12.5px;font-weight:500;cursor:pointer;
    transition:border-color .12s,color .12s;max-width:230px}
  .pchip:hover{border-color:var(--signal);color:var(--text-bright)}
  .pchip .pnum{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-dim);
    background:var(--panel-3);border-radius:4px;padding:2px 6px;flex:0 0 auto}
  .pchip .pname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pchip.on{border-color:var(--signal);background:var(--signal-dim);color:var(--text-bright)}
  .pchip.on .pnum{background:var(--signal);color:#042630}
  .pchip.dirty{border-color:var(--aux)}
  .pchip.dirty .pnum{background:var(--aux);color:#2a1d05}
  .pchip .pdot{width:6px;height:6px;border-radius:50%;background:var(--aux);
    box-shadow:0 0 7px var(--aux);flex:0 0 auto}
  .padd{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;
    background:transparent;border:1px dashed var(--line-bright);border-radius:7px;
    color:var(--text-dim);cursor:pointer}
  .padd:hover{border-color:var(--signal);color:var(--signal);border-style:solid}
  .pdirty{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;

  .pset-desc{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin-bottom:12px}
  .pset-empty{font-size:12.5px;color:var(--text-dim);line-height:1.5;padding:12px 13px;
    background:var(--panel-2);border:1px dashed var(--line-bright);border-radius:8px}
  .pset{display:flex;align-items:center;gap:7px;padding:8px 10px;margin-bottom:7px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px}
  .pset.on{border-color:var(--signal);background:var(--signal-dim)}
  .pset-apply{flex:0 0 auto;background:var(--panel-3);border:1px solid var(--line-bright);
    border-radius:6px;padding:5px 9px;cursor:pointer;color:var(--text)}
  .pset-apply:hover{border-color:var(--signal);color:var(--signal)}
  .pset.on .pset-apply{background:var(--signal);border-color:var(--signal)}
  .pset-num{font-family:var(--mono);font-size:11px;font-weight:700}
  .pset.on .pset-num{color:#042630}
  .pset-name{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line-bright);
    border-radius:5px;color:var(--text-bright);padding:6px 9px;font-family:var(--sans);
    font-size:12.5px;font-weight:600;outline:none}
  .pset-name:focus{border-color:var(--signal)}
  .pset-flag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--aux);flex:0 0 auto}
  .pset-btn{flex:0 0 auto;background:transparent;border:1px solid transparent;border-radius:6px;
    color:var(--text-dim);cursor:pointer;padding:5px;line-height:0}
  .pset-btn:hover{color:var(--signal);border-color:var(--line-bright)}
  .pset-btn.del:hover{color:#fff;background:var(--pgm);border-color:var(--pgm)}
  @media (max-width:820px){
    .presetbar{padding:6px 8px;gap:5px}
    .pchip{max-width:150px;font-size:12px}

<script>
"use strict";

const STORE   = "multiview.pub1";
const SCHEMA  = 2;

const DEFAULT_OPTS = () => ({
  autoRetry : true,   // sam ponawiaj kafelki, które nie wstały
  keepAwake : true,   // Wake Lock — ekran nie gaśnie
  showIntro : true,   // ekran powitalny (i tak tylko raz na przeglądarkę)
  locked    : false,  // blokada przed przypadkową edycją (NIE jest zabezpieczeniem)
});

const DEFAULTS = () => ({
  v: SCHEMA,
  sources: [],
  layout: {mode:"grid", cols:3, rows:2, cells:[], order:[], sizes:{}},
  presets: [],          // zapisane widoki — patrz sekcja PRESETY
  activePreset: null,
  lang: "pl",
  borderPx: 2,
  vol: 100,
  opts: DEFAULT_OPTS(),
});

let state          = DEFAULTS();
let activeAudioId  = null;   // która scena ma dźwięk
let editWall       = false;  // edycja układu na widoku głównym
let wakeLock       = null;

/* --- stan: zapis / odczyt --- */

// Sprowadza dane z localStorage do poprawnego kształtu.
function sanitizeState(raw){
  const d = DEFAULTS();
  if(!raw || typeof raw!=="object") return d;

  const okType = t => ["main","secondary","studio","timer"].includes(t);
  const s = Array.isArray(raw.sources) ? raw.sources : [];
  d.sources = s.filter(x=>x && typeof x==="object" && typeof x.id==="string").map(x=>({
    id      : String(x.id),
    name    : typeof x.name==="string" ? x.name.slice(0,120) : "—",
    type    : okType(x.type) ? x.type : "studio",
    url     : typeof x.url==="string" ? x.url.slice(0,2000) : "",
    enabled : x.enabled!==false,
    color   : safeColor(x.color) || null,
    fill    : !!x.fill,
    loop    : x.loop!==false,
    demo    : !!x.demo,
    mode    : ["down","up","clock"].includes(x.mode) ? x.mode : (x.type==="timer" ? "down" : undefined),
    h       : clampInt(x.h,0,99), m: clampInt(x.m,0,59), s: clampInt(x.s,0,59),
    run     : (x.run && typeof x.run==="object")
                ? {status:["idle","running","paused"].includes(x.run.status)?x.run.status:"idle",
                   startedAt:Number(x.run.startedAt)||0, accumMs:Math.max(0,Number(x.run.accumMs)||0)}
                : {status:"idle", startedAt:0, accumMs:0},
  }));

  const L = raw.layout && typeof raw.layout==="object" ? raw.layout : {};
  const ids = new Set(d.sources.map(x=>x.id));
  d.layout = {
    mode  : ["grid","focus","column","row","custom"].includes(L.mode) ? L.mode : "grid",
    cols  : clampInt(L.cols,1,12) || 3,
    rows  : clampInt(L.rows,1,12) || 2,
    cells : Array.isArray(L.cells) ? L.cells.map(c=> (typeof c==="string" && ids.has(c)) ? c : null) : [],
    order : Array.isArray(L.order) ? L.order.filter(c=>ids.has(c)) : [],
    sizes : {},
  };
  if(L.sizes && typeof L.sizes==="object"){
    for(const k of Object.keys(L.sizes)){
      if(!ids.has(k)) continue;
      const v = L.sizes[k]||{};
      d.layout.sizes[k] = {w:clampInt(v.w,1,12)||1, h:clampInt(v.h,1,12)||1};
    }
  }

  d.presets = (Array.isArray(raw.presets)?raw.presets:[])
    .filter(p=>p && typeof p==="object" && typeof p.id==="string")
    .slice(0,24)
    .map(p=>{
      const L = p.layout && typeof p.layout==="object" ? p.layout : {};
      const en = {};
      if(p.enabled && typeof p.enabled==="object")
        for(const k of Object.keys(p.enabled)) if(ids.has(k)) en[k]=!!p.enabled[k];
      const sizes={};
      if(L.sizes && typeof L.sizes==="object")
        for(const k of Object.keys(L.sizes)){
          if(!ids.has(k)) continue;
          const v=L.sizes[k]||{};
          sizes[k]={w:clampInt(v.w,1,12)||1, h:clampInt(v.h,1,12)||1};
        }
      return {
        id: String(p.id),
        name: typeof p.name==="string" ? p.name.slice(0,60) : "—",
        layout: {
          mode : ["grid","focus","column","row","custom"].includes(L.mode) ? L.mode : "grid",
          cols : clampInt(L.cols,1,12)||3,
          rows : clampInt(L.rows,1,12)||2,
          cells: Array.isArray(L.cells) ? L.cells.map(c=>(typeof c==="string"&&ids.has(c))?c:null) : [],
          order: [],
          sizes,
        },
        enabled: en,
      };
    });
  d.activePreset = (typeof raw.activePreset==="string" && d.presets.some(p=>p.id===raw.activePreset))
                     ? raw.activePreset : null;

  d.lang     = raw.lang==="en" ? "en" : "pl";
  d.borderPx = clampInt(raw.borderPx,0,8); if(d.borderPx===null) d.borderPx=2;
  d.vol      = clampInt(raw.vol,0,100); if(d.vol===null) d.vol=100;
  d.opts     = Object.assign(DEFAULT_OPTS(), (raw.opts&&typeof raw.opts==="object")?raw.opts:{});
  d.v        = SCHEMA;
  return d;
}

function clampInt(v,min,max){
  const n = parseInt(v,10);
  if(!Number.isFinite(n)) return null;
  return Math.max(min, Math.min(max, n));
}
// Kolor trafia do atrybutu style — przepuszczamy tylko hex.
function safeColor(c){
  return (typeof c==="string" && /^#[0-9a-fA-F]{3,8}$/.test(c)) ? c : null;
}

function loadState(){
  let raw = null;
  try{ raw = JSON.parse(localStorage.getItem(STORE)); }
  catch(e){ console.warn("Multiview: nieczytelny zapis w localStorage — startuję od zera.", e); }
  state = sanitizeState(raw);
}
function saveState(){
  try{ localStorage.setItem(STORE, JSON.stringify(state)); }
  catch(e){ console.warn("Multiview: nie udało się zapisać stanu.", e); }
}

// Gotowy <svg> do wstawienia w string HTML.
function ico(name, cls){
  const body = FALLBACK_ICONS[name] || "";
  return `<svg class="lucide ${cls||""}" viewBox="0 0 24 24" fill="none" stroke="currentColor" `
       + `stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${body}</svg>`;
}

// Można wołać wielokrotnie.
function paintIcons(){
  if(window.lucide && typeof window.lucide.createIcons==="function"){
    try{ window.lucide.createIcons(); }catch(e){ /* lecimy dalej na fallbacku */ }
  }
  // Reszta: brak CDN albo nieznana nazwa ikony.
  document.querySelectorAll("[data-lucide]").forEach(el=>{
    const name = el.getAttribute("data-lucide");
    const extra = el.className ? " "+el.className : "";
    const tmp = document.createElement("div");
    tmp.innerHTML = ico(name, extra.trim());
    const svg = tmp.firstElementChild;
    if(svg) el.replaceWith(svg);
  });
}

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg, bad){
  const el=document.getElementById("toast");
  document.getElementById("toastMsg").textContent=msg;
  el.classList.toggle("bad", !!bad);
  el.querySelector("svg,[data-lucide]")?.replaceWith(
    (()=>{ const d=document.createElement("div"); d.innerHTML=ico(bad?"circle-alert":"check"); return d.firstElementChild; })()
  );
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"), 2600);
}

/* --- linki -> embed --- */

function parseYtTime(v){
  if(v==null) return null;
  if(/^\d+$/.test(v)) return parseInt(v,10);
  const m=/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?$/.exec(v);
  if(!m) return null;
  const h=parseInt(m[1]||0,10), mi=parseInt(m[2]||0,10), s=parseInt(m[3]||0,10);
  return (h*3600+mi*60+s)||null;
}

function youTubeEmbedUrl(raw, opts){
  let u; try{ u=new URL(raw, location.href); }catch(e){ return null; }
  const host=u.hostname.replace(/^www\./,"").replace(/^m\./,"");
  if(!/^(youtube\.com|youtube-nocookie\.com|youtu\.be)$/.test(host)) return null;

  let id=null;
  const listId=u.searchParams.get("list");
  const path=u.pathname;
  if(host==="youtu.be")                 id=path.split("/").filter(Boolean)[0]||null;
  else if(path==="/watch")              id=u.searchParams.get("v");
  else if(path.startsWith("/live/"))    id=path.split("/")[2]||null;
  else if(path.startsWith("/shorts/"))  id=path.split("/")[2]||null;
  else if(path.startsWith("/embed/"))   id=path.split("/")[2]||null;
  if(!id && !listId) return null;

  const p=new URLSearchParams();
  p.set("autoplay","1");
  p.set("mute","1");          // przeglądarki wymagają startu bez dźwięku
  p.set("enablejsapi","1");   // ← klucz do sterowania audio i głośnością
  p.set("playsinline","1");
  p.set("rel","0");
  p.set("modestbranding","1");
  const tSec=parseYtTime(u.searchParams.get("t")||u.searchParams.get("start"));
  if(tSec) p.set("start",String(tSec));
  if(listId) p.set("list",listId);
  if(!opts || opts.loop!==false){
    p.set("loop","1");
    if(id && !listId) p.set("playlist", id);
  }
  p.set("origin", location.origin);
  return `https://www.youtube.com/embed/${id||"videoseries"}?${p.toString()}`;
}

function twitchEmbedUrl(raw, opts){
  let u; try{ u=new URL(raw, location.href); }catch(e){ return null; }
  const host=u.hostname.replace(/^www\./,"");
  const parent=location.hostname||"localhost";
  const muted=(!opts || opts.muted!==false) ? "true" : "false";

  if(host==="player.twitch.tv"){
    u.searchParams.set("parent",parent);
    if(!u.searchParams.has("autoplay")) u.searchParams.set("autoplay","true");
    u.searchParams.set("muted",muted);
    return u.toString();
  }
  if(host==="clips.twitch.tv"){
    const slug=u.pathname.split("/").filter(Boolean)[0];
    if(!slug) return null;
    return `https://clips.twitch.tv/embed?${new URLSearchParams({clip:slug,parent,autoplay:"true",muted}).toString()}`;
  }
  if(host==="twitch.tv"){
    const parts=u.pathname.split("/").filter(Boolean);
    if(!parts.length) return null;
    if(parts[0]==="videos" && parts[1])
      return `https://player.twitch.tv/?${new URLSearchParams({video:parts[1],parent,autoplay:"true",muted}).toString()}`;
    if(parts.length>=3 && parts[1]==="clip")
      return `https://clips.twitch.tv/embed?${new URLSearchParams({clip:parts[2],parent,autoplay:"true",muted}).toString()}`;
    if(["directory","p","subscriptions","settings","downloads"].includes(parts[0])) return null;
    return `https://player.twitch.tv/?${new URLSearchParams({channel:parts[0],parent,autoplay:"true",muted}).toString()}`;
  }
  return null;
}

function kickEmbedUrl(raw, opts){
  let u; try{ u=new URL(raw, location.href); }catch(e){ return null; }
  const host=u.hostname.replace(/^www\./,"");
  const muted=(!opts || opts.muted!==false) ? "true" : "false";
  if(host==="player.kick.com"){
    if(!u.searchParams.has("autoplay")) u.searchParams.set("autoplay","true");
    u.searchParams.set("muted",muted);
    return u.toString();
  }
  if(host==="kick.com"){
    const parts=u.pathname.split("/").filter(Boolean);
    if(!parts.length) return null;
    if(["video","clips","categories","search","subscribe","browse","following"].includes(parts[0])) return null;
    return `https://player.kick.com/${encodeURIComponent(parts[0])}?${new URLSearchParams({autoplay:"true",muted}).toString()}`;
  }
  return null;
}

function spotifyEmbedUrl(raw){
  let u; try{ u=new URL(raw, location.href); }catch(e){ return null; }
  if(u.hostname.replace(/^www\./,"")!=="open.spotify.com") return null;
  if(u.pathname.startsWith("/embed/")) return u.toString();
  const parts=u.pathname.split("/").filter(Boolean);
  const known=["track","album","playlist","artist","episode","show"];
  const ti=parts.findIndex(p=>known.includes(p));
  if(ti<0 || !parts[ti+1]) return null;
  return `https://open.spotify.com/embed/${parts[ti]}/${parts[ti+1].split("?")[0]}`;
}

function appleMusicEmbedUrl(raw){
  let u; try{ u=new URL(raw, location.href); }catch(e){ return null; }
  const host=u.hostname.replace(/^www\./,"");
  if(host==="embed.music.apple.com") return u.toString();
  if(host==="music.apple.com") return "https://embed.music.apple.com"+u.pathname+u.search;
  return null;
}

function vimeoEmbedUrl(raw, opts){
  let u; try{ u=new URL(raw, location.href); }catch(e){ return null; }
  const host=u.hostname.replace(/^www\./,"");
  if(host==="player.vimeo.com") return u.toString();
  if(host!=="vimeo.com") return null;
  const id=u.pathname.split("/").filter(Boolean).find(p=>/^\d+$/.test(p));
  if(!id) return null;
  const muted=(!opts || opts.muted!==false) ? "1" : "0";
  return `https://player.vimeo.com/video/${id}?${new URLSearchParams({autoplay:"1",muted,playsinline:"1"}).toString()}`;
}

function platformEmbedUrl(raw, opts){
  return youTubeEmbedUrl(raw,opts) || twitchEmbedUrl(raw,opts) || kickEmbedUrl(raw,opts)
      || vimeoEmbedUrl(raw,opts) || spotifyEmbedUrl(raw) || appleMusicEmbedUrl(raw) || null;
}

// audio: "api" = postMessage, "reload" = podmiana parametru muted, "none" = brak sterowania
function detectPlatform(raw){
  if(!raw || !raw.trim()) return {key:"empty", label:"", audio:"none"};
  if(youTubeEmbedUrl(raw))    return {key:"youtube",  label:"YouTube",     audio:"api"};
  if(twitchEmbedUrl(raw))     return {key:"twitch",   label:"Twitch",      audio:"reload"};
  if(kickEmbedUrl(raw))       return {key:"kick",     label:"Kick",        audio:"reload"};
  if(vimeoEmbedUrl(raw))      return {key:"vimeo",    label:"Vimeo",       audio:"reload"};
  if(spotifyEmbedUrl(raw))    return {key:"spotify",  label:"Spotify",     audio:"none"};
  if(appleMusicEmbedUrl(raw)) return {key:"apple",    label:"Apple Music", audio:"none"};
  try{ new URL(raw, location.href); }catch(e){ return {key:"bad", label:"", audio:"none"}; }
  return {key:"other", label:"", audio:"none"};
}

/* ---------- drobne pomocniki ---------- */
const DEMO_COLORS=["#ff2d21","#46c26a","#e0a33a","#33b5d1","#a06cff","#ff6ba6"];
const demoColor = i => DEMO_COLORS[((i%DEMO_COLORS.length)+DEMO_COLORS.length)%DEMO_COLORS.length];
const p2  = n => String(n||0).padStart(2,"0");
const durOf = src => (src.h||0)*3600+(src.m||0)*60+(src.s||0);
function fmtTimer(s){
  s=Math.max(0,Math.floor(s));
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  return h>0 ? `${h}:${p2(m)}:${p2(ss)}` : `${p2(m)}:${p2(ss)}`;
}
function clockRemaining(src){
  const now=new Date();
  return durOf(src) - (now.getHours()*3600+now.getMinutes()*60+now.getSeconds());
}
const typeColor = ty => ty==="main" ? "var(--pgm)" : ty==="secondary" ? "var(--pvw)" : "var(--aux)";

/* --- timery --- */
function runOf(src){
  if(!src.run || typeof src.run!=="object") src.run={status:"idle",startedAt:0,accumMs:0};
  return src.run;
}
function timerElapsedMs(src){
  const r=runOf(src);
  return r.accumMs + (r.status==="running" ? Math.max(0, Date.now()-r.startedAt) : 0);
}
function timerValue(src){
  if(src.mode==="clock") return clockRemaining(src);
  const el=timerElapsedMs(src)/1000;
  return src.mode==="up" ? el : Math.max(0, durOf(src)-el);
}
function timerDone(src){
  if(src.mode==="clock") return clockRemaining(src)<0;
  return src.mode!=="up" && durOf(src)>0 && timerElapsedMs(src)/1000>=durOf(src);
}
function timerToggle(src){
  const r=runOf(src);
  if(r.status==="running"){ r.accumMs+=Date.now()-r.startedAt; r.status="paused"; }
  else { r.startedAt=Date.now(); r.status="running"; }
  saveState();
}
function timerReset(src){
  src.run={status:"idle",startedAt:0,accumMs:0};
  saveState();
}

/* --- kafelki --- */
const tileNodes = new Map();   // id -> { el, sig, iframe, kind, retries }
const RETRY_MS  = 18000;       // po tylu ms bez sygnału ponawiamy
const LOAD_MS   = 12000;       // po tylu ms bez zdarzenia load uznajemy „brak sygnału"

function embedFor(src){
  const wantsSound = activeAudioId===src.id;
  return platformEmbedUrl(src.url, {loop: src.loop!==false, muted: !wantsSound}) || src.url;
}
function tileSig(src){
  if(src.type==="timer") return "timer|"+(src.mode||"down");
  if(src.demo)           return "demo|"+(src.color||"");
  if(src.url)            return "frame|"+embedFor(src);
  return "empty";
}

/* --- pasek statusu na kafelku (ładowanie / brak sygnału) --- */
function setTileStatus(el, kind){        // kind: "loading" | "error" | null
  el.classList.toggle("tile-loading", kind==="loading");
  el.classList.toggle("tile-error",   kind==="error");
  const box=el.querySelector(".tstatus");
  if(!box) return;
  if(kind==="loading"){
    box.innerHTML=`${ico("loader-circle")}<div class="ts-title">${esc(t("loadingT"))}</div>`;
  }else if(kind==="error"){
    box.innerHTML=`${ico("triangle-alert")}
      <div class="ts-title">${esc(t("noSignal"))}</div>
      <div class="ts-sub">${esc(t("noSignalSub"))}</div>
      <button data-a="retry">${ico("rotate-cw","ico-sm")}${esc(t("retry"))}</button>`;
    const b=box.querySelector("[data-a='retry']");
    if(b) b.onclick=()=>reloadTile(el.dataset.srcId);
  }
}

function watchIframe(id){
  const rec=tileNodes.get(id);
  if(!rec || !rec.iframe) return;
  clearTimeout(rec.loadTimer); clearTimeout(rec.retryTimer);
  setTileStatus(rec.el,"loading");
  rec.loadTimer=setTimeout(()=>{
    setTileStatus(rec.el,"error");
    if(state.opts.autoRetry && (rec.retries||0)<5){
      rec.retries=(rec.retries||0)+1;
      rec.retryTimer=setTimeout(()=>reloadTile(id), RETRY_MS);
    }
  }, LOAD_MS);
  rec.iframe.onload=()=>{
    clearTimeout(rec.loadTimer); clearTimeout(rec.retryTimer);
    rec.retries=0; setTileStatus(rec.el,null);
  };
}

function reloadTile(id){
  const rec=tileNodes.get(id), src=byId(id);
  if(!rec || !rec.iframe || !src) return;
  const url=embedFor(src);
  rec.iframe.src="about:blank";                       // pewny reset także poza Chrome
  requestAnimationFrame(()=>{ rec.iframe.src=url; watchIframe(id); });
}

/* --- budowa nowego kafelka --- */
function createTile(src){
  const el=document.createElement("div");
  el.className="tile";
  el.dataset.srcId=src.id;

  // TIMER
  if(src.type==="timer"){
    const col=safeColor(src.color)||"#33b5d1";
    const wrap=document.createElement("div");
    wrap.className="tmr-tile";
    wrap.style.background=`radial-gradient(120% 120% at 50% 15%, ${col}22 0%, #0b0e13 70%)`;
    wrap.innerHTML=`<div class="tmr-name"></div><div class="tmr-time"></div>`
      + (src.mode==="clock"
          ? `<div class="tmr-sub"></div>`
          : `<div class="tmr-ctl">
               <button data-tc="toggle">${ico("play","ico-sm")}<span></span></button>
               <button data-tc="reset">${ico("rotate-ccw","ico-sm")}<span>${esc(t("tmrReset"))}</span></button>
             </div>`);
    el.appendChild(wrap);
    const tgl=wrap.querySelector('[data-tc="toggle"]');
    if(tgl) tgl.onclick=()=>{ timerToggle(src); paintTimer(src); };
    const rst=wrap.querySelector('[data-tc="reset"]');
    if(rst) rst.onclick=()=>{ timerReset(src); paintTimer(src); };
    el.appendChild(tileControls(src,["hide"]));
    return {el, kind:"timer", iframe:null};
  }

  // DEMO
  if(src.demo){
    const col=safeColor(src.color)||demoColor(0);
    const ph=document.createElement("div");
    ph.className="demo-ph";
    ph.style.background=`radial-gradient(120% 120% at 30% 20%, ${col}55 0%, ${col}18 45%, #0b0e13 100%)`;
    ph.innerHTML=`<span class="demo-badge" style="color:${col}">DEMO</span><span class="demo-name"></span>`;
    el.appendChild(ph);
    el.appendChild(tileControls(src,["hide"]));
    el.appendChild(makeStrip());
    return {el, kind:"demo", iframe:null};
  }

  // STREAM
  if(src.url){
    const f=document.createElement("iframe");
    f.title=src.name||"stream";
    f.setAttribute("loading","eager");
    f.setAttribute("allow","autoplay; fullscreen; encrypted-media; picture-in-picture; accelerometer; gyroscope; clipboard-write");
    f.setAttribute("referrerpolicy","strict-origin-when-cross-origin");
    f.setAttribute("allowfullscreen","");
    f.src=embedFor(src);
    el.appendChild(f);
    const status=document.createElement("div");
    status.className="tstatus";
    el.appendChild(status);
    el.appendChild(tileControls(src,["fill","loop","hide","reload","full","open"]));
    el.appendChild(makeStrip());
    return {el, kind:"frame", iframe:f};
  }

  // BRAK ADRESU
  const ph=document.createElement("div");
  ph.className="ph";
  ph.innerHTML=`<div class="big"></div><div class="small">${esc(t("noUrl"))}</div>`;
  el.appendChild(ph);
  el.appendChild(makeStrip());
  return {el, kind:"empty", iframe:null};
}

function makeStrip(){
  const strip=document.createElement("div");
  strip.className="strip";
  strip.innerHTML=`<span class="tally"><span class="dot"></span></span>
    <span class="name"></span>
    <span class="aud">${esc(t("btnAudio"))}</span>
    <span class="idx"></span>`;
  return strip;
}

function tileControls(src, which){
  const ctl=document.createElement("div");
  ctl.className="tctl";
  const isYT=!!youTubeEmbedUrl(src.url||"");
  const defs={
    fill  :["expand",       t("tFill")],
    loop  :["repeat",       t("tLoop")],
    hide  :["eye-off",      t("tHide")],
    reload:["rotate-cw",    t("tReload")],
    full  :["maximize",     t("tFull")],
    open  :["external-link",t("tOpen")],
  };
  which.forEach(k=>{
    if(k==="loop" && !isYT) return;
    const [icon,label]=defs[k];
    const b=document.createElement("button");
    b.dataset.a=k; b.title=label; b.setAttribute("aria-label",label);
    b.innerHTML=ico(icon);
    ctl.appendChild(b);
  });
  ctl.querySelectorAll("button").forEach(b=>{
    const a=b.dataset.a, el=()=>tileNodes.get(src.id)?.el;
    if(a==="fill")   b.onclick=()=>{ src.fill=!src.fill; saveState();
                                     el()?.classList.toggle("fill",src.fill); b.classList.toggle("active",src.fill); };
    if(a==="loop")   b.onclick=()=>{ src.loop=(src.loop===false); saveState(); renderWall(); };
    if(a==="hide")   b.onclick=()=>{ src.enabled=false; saveState(); renderWall(); renderSettingsIfOpen(); };
    if(a==="reload") b.onclick=()=>reloadTile(src.id);
    if(a==="full")   b.onclick=()=>{ const e=el(); if(e && e.requestFullscreen) e.requestFullscreen().catch(()=>{}); };
    if(a==="open")   b.onclick=()=>window.open(src.url,"_blank","noopener");
  });
  return ctl;
}

/* --- kosmetyka nanoszona bez przebudowy --- */
function paintTile(src, index){
  const rec=tileNodes.get(src.id); if(!rec) return;
  const el=rec.el;
  el.className="tile t-"+src.type
    + (src.demo?" demo-tile":"")
    + (src.fill?" fill":"")
    + (el.classList.contains("tile-error")?" tile-error":"")
    + (el.classList.contains("tile-loading")?" tile-loading":"")
    + (activeAudioId===src.id?" audio-live":"");
  el.style.borderWidth=(state.borderPx!=null?state.borderPx:2)+"px";
  const col=safeColor(src.color);
  if(col) el.style.borderColor=col; else el.style.removeProperty("border-color");

  const nm=el.querySelector(".strip .name");   if(nm) nm.textContent=src.name;
  const ix=el.querySelector(".strip .idx");    if(ix) ix.textContent=String(index).padStart(2,"0");
  const dn=el.querySelector(".demo-name");     if(dn) dn.textContent=src.name;
  const bg=el.querySelector(".ph .big");       if(bg) bg.textContent=src.name;
  const fl=el.querySelector('[data-a="fill"]');if(fl) fl.classList.toggle("active",!!src.fill);
  const lp=el.querySelector('[data-a="loop"]');if(lp) lp.classList.toggle("active",src.loop!==false);
  if(src.type==="timer") paintTimer(src);
}

function paintTimer(src){
  const rec=tileNodes.get(src.id); if(!rec) return;
  const el=rec.el;
  const nameEl=el.querySelector(".tmr-name"); if(nameEl) nameEl.textContent=src.name;
  const col=safeColor(src.color)||"#33b5d1";
  const te=el.querySelector(".tmr-time"); if(!te) return;
  const v=timerValue(src), done=timerDone(src);
  const neg=src.mode==="clock" && v<0;
  te.textContent=(neg?"−":"")+fmtTimer(Math.abs(v));
  te.style.color = (done||neg) ? "#ff2d21" : col;
  te.classList.toggle("done", done||neg);
  const sub=el.querySelector(".tmr-sub");
  if(sub) sub.textContent=`${t("tmrToLabel")} ${p2(src.h)}:${p2(src.m)}`;
  const tgl=el.querySelector('[data-tc="toggle"]');
  if(tgl){
    const running=runOf(src).status==="running";
    tgl.querySelector("span").textContent = running ? t("tmrPause") : t("tmrStart");
    const old=tgl.querySelector("svg");
    if(old){ const d=document.createElement("div"); d.innerHTML=ico(running?"pause":"play","ico-sm"); old.replaceWith(d.firstElementChild); }
  }
  const rst=el.querySelector('[data-tc="reset"] span'); if(rst) rst.textContent=t("tmrReset");
}

/* --- ściana --- */

function ensureCells(){
  const need=state.layout.cols*state.layout.rows, c=state.layout.cells;
  while(c.length<need) c.push(null);
  c.length=need;
  if(!state.layout.sizes) state.layout.sizes={};
}

// Rozmieszcza kafelki na siatce cols×rows, bez nakładania.
function computeLayout(cols,rows,cells,sizes){
  const covered=new Set(), placed=[];
  for(let i=0;i<cols*rows;i++){
    const id=cells[i]; if(!id) continue;
    const src=byId(id); if(!src||!src.enabled) continue;
    if(covered.has(i)) continue;
    const r=Math.floor(i/cols), c=i%cols;
    const dW=Math.max(1,(sizes[id]&&sizes[id].w)||1), dH=Math.max(1,(sizes[id]&&sizes[id].h)||1);
    let w=1;
    for(let cc=c; cc<Math.min(c+dW,cols); cc++){
      const idx=r*cols+cc;
      if(cc>c && (covered.has(idx) || (cells[idx] && idx!==i))) break;
      w=cc-c+1;
    }
    let h=1;
    for(let rr=r; rr<Math.min(r+dH,rows); rr++){
      let ok=true;
      for(let cc=c; cc<c+w; cc++){ const idx=rr*cols+cc; if(rr>r && (covered.has(idx)||(cells[idx]&&idx!==i))){ok=false;break;} }
      if(!ok) break; h=rr-r+1;
    }
    placed.push({id,i,r,c,w,h});
    for(let rr=r;rr<r+h;rr++) for(let cc=c;cc<c+w;cc++){ const idx=rr*cols+cc; if(idx!==i) covered.add(idx); }
  }
  return {placed,covered};
}

function presetArrange(mode, ids){
  const n=ids.length;
  if(!n) return null;
  if(mode==="column") return {cols:1, rows:n, items:ids.map((id,i)=>({id,c:0,r:i,w:1,h:1}))};
  if(mode==="row")    return {cols:n, rows:1, items:ids.map((id,i)=>({id,c:i,r:0,w:1,h:1}))};
  if(mode==="focus"){
    if(n===1) return {cols:1, rows:1, items:[{id:ids[0],c:0,r:0,w:1,h:1}]};
    const cols=n-1, rows=3;
    const items=[{id:ids[0], c:0, r:0, w:cols, h:2}];
    for(let i=1;i<n;i++) items.push({id:ids[i], c:i-1, r:2, w:1, h:1});
    return {cols, rows, items};
  }
  const cols=Math.max(1,Math.ceil(Math.sqrt(n))), rows=Math.ceil(n/cols);
  return {cols, rows, items:ids.map((id,i)=>({id, c:i%cols, r:Math.floor(i/cols), w:1, h:1}))};
}

function destroyTile(id){
  const rec=tileNodes.get(id); if(!rec) return;
  clearTimeout(rec.loadTimer); clearTimeout(rec.retryTimer);
  rec.el.remove();
  tileNodes.delete(id);
}

function syncTiles(items){
  const wall=document.getElementById("wall");
  const wanted=new Set(items.map(p=>p.id));
  for(const id of [...tileNodes.keys()]) if(!wanted.has(id)) destroyTile(id);

  items.forEach((p,i)=>{
    const src=byId(p.id); if(!src) return;
    const sig=tileSig(src);
    let rec=tileNodes.get(p.id);
    if(rec && rec.sig!==sig){ destroyTile(p.id); rec=null; }   // zmiana wymuszająca reload
    if(!rec){
      const built=createTile(src);
      rec={el:built.el, sig, iframe:built.iframe, kind:built.kind, retries:0};
      tileNodes.set(p.id, rec);
      wall.appendChild(rec.el);
      if(rec.iframe) watchIframe(p.id);
    }
    rec.el.style.gridColumn=`${p.c+1} / span ${p.w}`;
    rec.el.style.gridRow   =`${p.r+1} / span ${p.h}`;
    paintTile(src, i+1);
  });
  paintIcons();
}

function renderWall(){
  const wall=document.getElementById("wall");
  const overlay=document.getElementById("wallOverlay");

  if(editWall){ renderWallEdit(); return; }
  overlay.hidden=true; overlay.replaceChildren();
  const bar=document.getElementById("ewbar"); if(bar) bar.remove();

  wall.className="wall";
  const act=state.sources.filter(s=>s.enabled);

  if(!act.length){
    syncTiles([]);
    showEmptyState();
    afterWall();
    return;
  }

  if(state.layout.mode==="custom"){
    ensureCells();
    const cols=Math.max(1,state.layout.cols||3), rows=Math.max(1,state.layout.rows||2);
    wall.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    wall.style.gridTemplateRows   =`repeat(${rows},1fr)`;
    const {placed}=computeLayout(cols,rows,state.layout.cells,state.layout.sizes||{});
    syncTiles(placed);
  }else{
    const arr=presetArrange(state.layout.mode, act.map(s=>s.id));
    if(arr){
      wall.style.gridTemplateColumns=`repeat(${arr.cols},1fr)`;
      wall.style.gridTemplateRows   =`repeat(${arr.rows},1fr)`;
      syncTiles(arr.items);
    }
  }
  afterWall();
}

function showEmptyState(){
  const overlay=document.getElementById("wallOverlay");
  overlay.hidden=false;
  overlay.style.placeItems="center";
  overlay.replaceChildren();
  const e=document.createElement("div");
  e.className="empty-state";
  e.innerHTML=`<div class="es-inner">
      ${ico("layout-grid","ico-xl")}
      <div class="es-title">${esc(t("emptyTitle"))}</div>
      <div class="es-sub">${esc(t("emptySub"))}</div>
      <button class="es-btn" id="esAdd">${esc(t("emptyBtn"))}</button>
      <button class="btn-ghost" id="esHelp" style="margin-top:2px">${esc(t("emptyHelp"))}</button>
    </div>`;
  overlay.appendChild(e);
  e.querySelector("#esAdd").onclick =()=>{ renderSettings(); openDrawer(document.getElementById("settingsDrawer")); };
  e.querySelector("#esHelp").onclick=()=>{ renderHelp();     openDrawer(document.getElementById("helpDrawer")); };
}

function afterWall(){
  renderPresetBar();
  // Nowe iframe'y startują wyciszone.
  if(activeAudioId && !tileNodes.has(activeAudioId)) activeAudioId=null;
  markAudio();
  const ab=document.getElementById("audiobar");
  if(ab && !ab.hidden) renderAudioPanel();
}

function renderSettingsIfOpen(){
  if(document.getElementById("settingsDrawer").classList.contains("show")) renderSettings();
}

/* --- audio --- */

function ytCmd(iframe, func, args){
  if(!iframe || !iframe.contentWindow) return;
  try{
    iframe.contentWindow.postMessage(
      JSON.stringify({event:"command", func, args:args||[]}), "https://www.youtube.com");
  }catch(e){}
}
function audioModeOf(src){ return detectPlatform(src.url||"").audio; }

// Odtwarzacz bywa niegotowy tuż po load, stąd kilka prób.
function applyAudio(id, tries){
  const rec=tileNodes.get(id), src=byId(id);
  if(!rec || !rec.iframe || !src) return;
  const on = activeAudioId===id;
  if(audioModeOf(src)==="api"){
    if(on){ ytCmd(rec.iframe,"unMute"); ytCmd(rec.iframe,"setVolume",[state.vol]); }
    else  { ytCmd(rec.iframe,"mute"); }
  }
  const n=(tries||0);
  if(on && n<4) setTimeout(()=>applyAudio(id,n+1), 400+n*350);
}

function setSolo(id){
  const prev=activeAudioId;
  activeAudioId = (prev===id) ? null : id;
  if(prev) applyAudio(prev);
  if(activeAudioId) applyAudio(activeAudioId);
  renderWall();               // przebuduje tylko te kafelki, które tego wymagają
  renderAudioPanel();
}

function muteAll(){
  const prev=activeAudioId;
  activeAudioId=null;
  if(prev) applyAudio(prev);
  tileNodes.forEach(rec=>{ if(rec.iframe) ytCmd(rec.iframe,"mute"); });
  renderWall();
  renderAudioPanel();
}

function markAudio(){
  tileNodes.forEach((rec,id)=>rec.el.classList.toggle("audio-live", activeAudioId===id));
  const el=document.getElementById("abActive");

  const volBox=document.getElementById("abVol");

  list.replaceChildren();

    const src=byId(id); if(!src) return;

    b.className=`ab-pill t-${src.type}`+(id===activeAudioId?" on":"");

function toggleAudioBar(force){
  const ab=document.getElementById("audiobar");

/* --- drag & drop --- */
let dragId=null, dragFrom=null, dragGhost=null, dropHover=null;

function registerDropTarget(el, handler){
  el.dataset.drop="1";
  el.__onDrop=handler;
}
function makeDragSource(el, id, fromIndex){
  el.addEventListener("pointerdown", e=>{
    if(e.button!==undefined && e.button!==0) return;
    e.preventDefault();
    beginDrag(e, id, fromIndex);
  });
}
function moveGhost(x,y){ if(dragGhost){ dragGhost.style.left=x+"px"; dragGhost.style.top=y+"px"; } }

function beginDrag(e, id, from){
  dragId=id; dragFrom=(from===undefined?null:from);
  const src=byId(id);
  dragGhost=document.createElement("div");
  dragGhost.className="drag-ghost";
  dragGhost.textContent=src?src.name:"";
  document.body.appendChild(dragGhost);
  moveGhost(e.clientX,e.clientY);
  window.addEventListener("pointermove", onDragMove);
  window.addEventListener("pointerup", onDragEnd);
  window.addEventListener("pointercancel", onDragEnd);
}
function targetAt(x,y){
  const el=document.elementFromPoint(x,y);
  return el ? el.closest("[data-drop]") : null;
}
function onDragMove(e){
  moveGhost(e.clientX,e.clientY);
  const tgt=targetAt(e.clientX,e.clientY);
  if(tgt!==dropHover){
    if(dropHover) dropHover.classList.remove("dragover");
    dropHover=tgt;
    if(dropHover) dropHover.classList.add("dragover");
  }
}
function onDragEnd(e){
  window.removeEventListener("pointermove", onDragMove);
  window.removeEventListener("pointerup", onDragEnd);
  window.removeEventListener("pointercancel", onDragEnd);
  const tgt=targetAt(e.clientX,e.clientY);
  if(dropHover) dropHover.classList.remove("dragover");
  if(dragGhost) dragGhost.remove();
  dragGhost=null; dropHover=null;
  const id=dragId, from=dragFrom;
  dragId=null; dragFrom=null;
  if(tgt && typeof tgt.__onDrop==="function" && id) tgt.__onDrop(id, from);
}

function dropIntoCell(i, id, from, occupied){
  const cells=state.layout.cells, sizes=state.layout.sizes;
  if(from!==null && from!==undefined){        // przenoszenie / zamiana miejscami
    const tmp=cells[i]; cells[i]=id; cells[from]=tmp;
  }else{                                      // z palety
    if(occupied) return false;
    const existing=cells.indexOf(id);
    if(existing>-1) cells[existing]=null;
    cells[i]=id;
    if(!sizes[id]) sizes[id]={w:1,h:1};
  }
  return true;
}

/* --- edycja układu na ścianie --- */
function renderWallEdit(){
  const overlay=document.getElementById("wallOverlay");
  overlay.hidden=false;
  overlay.style.placeItems="";
  overlay.replaceChildren();
  ensureCells();

  const cols=Math.max(1,state.layout.cols||3), rows=Math.max(1,state.layout.rows||2);
  overlay.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  overlay.style.gridTemplateRows   =`repeat(${rows},1fr)`;

  const cells=state.layout.cells, sizes=state.layout.sizes;
  const {placed,covered}=computeLayout(cols,rows,cells,sizes);
  const startMap={}; placed.forEach(p=>startMap[p.i]=p);

  for(let i=0;i<cols*rows;i++){
    if(covered.has(i)) continue;
    const r=Math.floor(i/cols), c=i%cols, p=startMap[i];
    const cell=document.createElement("div");
    if(p){
      const src=byId(p.id), col=safeColor(src.color)||demoColor(i);
      cell.className="tile ew-tile";
      cell.style.gridColumn=`${c+1} / span ${p.w}`;
      cell.style.gridRow=`${r+1} / span ${p.h}`;
      cell.style.borderColor=col;
      cell.style.borderWidth=(state.borderPx!=null?state.borderPx:2)+"px";
      cell.style.background=`radial-gradient(120% 120% at 30% 20%, ${col}44 0%, ${col}12 45%, #0b0e13 100%)`;
      cell.innerHTML=`<span class="ew-name">${esc(src.name)}</span>
        <div class="ew-ctl">
          <span class="ew-lbl">W</span>
          <button data-sz="w" data-d="-1" aria-label="-">${ico("minus","ico-sm")}</button><b>${p.w}</b>
          <button data-sz="w" data-d="1" aria-label="+">${ico("plus","ico-sm")}</button>
          <span class="ew-lbl">H</span>
          <button data-sz="h" data-d="-1" aria-label="-">${ico("minus","ico-sm")}</button><b>${p.h}</b>
          <button data-sz="h" data-d="1" aria-label="+">${ico("plus","ico-sm")}</button>
          <button class="ew-del" title="${esc(t("titleDel"))}" aria-label="${esc(t("titleDel"))}">${ico("trash-2","ico-sm")}</button>
        </div>`;
      cell.querySelectorAll("[data-sz]").forEach(btn=>{ btn.onclick=e=>{
        e.stopPropagation();
        const k=btn.dataset.sz, d=parseInt(btn.dataset.d,10);
        const cur=sizes[p.id]||{w:1,h:1}, nw={w:cur.w||1,h:cur.h||1};
        nw[k]=Math.max(1,Math.min(k==="w"?cols:rows,(nw[k]||1)+d));
        sizes[p.id]=nw; saveState(); renderWallEdit();
      };});
      cell.querySelector(".ew-del").onclick=e=>{
        e.stopPropagation(); cells[i]=null; delete sizes[p.id]; saveState(); renderWallEdit();
      };
      makeDragSource(cell.querySelector(".ew-name"), p.id, i);
    }else{
      cell.className="tile ew-empty";
      cell.style.gridColumn=`${c+1}`; cell.style.gridRow=`${r+1}`;
      cell.innerHTML=`<span class="ew-hint">${esc(t("dropScene"))}</span>`;
    }
    registerDropTarget(cell,(id,from)=>{
      if(dropIntoCell(i,id,from,!!startMap[i])){ saveState(); renderWallEdit(); }
    });
    overlay.appendChild(cell);
  }
  buildEditBar();
}

function buildEditBar(){
  let bar=document.getElementById("ewbar");
  if(!bar){ bar=document.createElement("div"); bar.id="ewbar"; bar.className="ewbar"; document.body.appendChild(bar); }
  const placedIds=new Set(state.layout.cells.filter(Boolean));
  const avail=state.sources.filter(s=>s.enabled && !placedIds.has(s.id));
  const chips=avail.map(s=>
    `<span class="ewchip" data-id="${esc(s.id)}"><span class="cd" style="background:${safeColor(s.color)||'#33b5d1'}"></span>${esc(s.name)}</span>`).join("");
  bar.innerHTML=`
    <div class="grp"><span class="lbl">${esc(t("cols"))}</span>
      <button class="st" data-ew="cols" data-d="-1" aria-label="-">${ico("minus","ico-sm")}</button>
      <span class="val">${state.layout.cols}</span>
      <button class="st" data-ew="cols" data-d="1" aria-label="+">${ico("plus","ico-sm")}</button></div>
    <div class="grp"><span class="lbl">${esc(t("rows"))}</span>
      <button class="st" data-ew="rows" data-d="-1" aria-label="-">${ico("minus","ico-sm")}</button>
      <span class="val">${state.layout.rows}</span>
      <button class="st" data-ew="rows" data-d="1" aria-label="+">${ico("plus","ico-sm")}</button></div>
    ${chips?`<div class="ewpal">${chips}</div>`:""}
    <button class="done" id="ewDone">${ico("check","ico-sm")} ${esc(t("done"))}</button>`;
  bar.querySelectorAll("[data-ew]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.ew, d=parseInt(b.dataset.d,10);
    state.layout[k]=Math.min(12,Math.max(1,(state.layout[k]||1)+d));
    ensureCells(); saveState(); renderWallEdit();

  bar.querySelectorAll(".ewchip").forEach(ch=>makeDragSource(ch, ch.dataset.id, null));

}
