function renderEditor(){
  renderPresetList(); renderPresetBar();
  document.getElementById("customEditor").hidden = state.layout.mode!=="custom";
  document.querySelectorAll(".preset-btn").forEach(b=>
    b.setAttribute("aria-pressed", String(b.dataset.preset===state.layout.mode)));
  if(state.layout.mode!=="custom") return;

  ensureCells();
  const cols=state.layout.cols, rows=state.layout.rows;
  const cells=state.layout.cells, sizes=state.layout.sizes;
  document.getElementById("colsVal").textContent=cols;
  document.getElementById("rowsVal").textContent=rows;
  document.getElementById("sizeToggle").setAttribute("aria-expanded",String(resizeMode));

  const grid=document.getElementById("editorGrid");
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.style.gridTemplateRows   =`repeat(${rows},1fr)`;
  grid.replaceChildren();

  const {placed,covered}=computeLayout(cols,rows,cells,sizes);
  const startMap={}; placed.forEach(p=>startMap[p.i]=p);

  for(let i=0;i<cols*rows;i++){
    if(covered.has(i)) continue;
    const r=Math.floor(i/cols), c=i%cols, p=startMap[i];
    const cell=document.createElement("div");
    if(p){
      const src=byId(p.id);
      cell.className=`cell filled f-${src.type}`;
      cell.style.gridColumn=`${c+1} / span ${p.w}`;
      cell.style.gridRow=`${r+1} / span ${p.h}`;
      cell.innerHTML=`<span class="cname">${esc(src.name)}</span>
        <button class="clear" title="${esc(t("titleDel"))}" aria-label="${esc(t("titleDel"))}">${ico("x","ico-sm")}</button>`;
      if(resizeMode){
        cell.classList.add("pickable");
        if(selectedId===p.id) cell.classList.add("selected");
        cell.onclick=e=>{ if(e.target.closest(".clear")) return; selectedId=p.id; renderEditor(); };
      }
      cell.querySelector(".clear").onclick=e=>{
        e.stopPropagation(); cells[i]=null; delete sizes[p.id];
        if(selectedId===p.id) selectedId=null;
        saveState(); renderEditor();
      };
      makeDragSource(cell.querySelector(".cname"), p.id, i);
    }else{
      cell.className="cell";
      cell.style.gridColumn=`${c+1}`; cell.style.gridRow=`${r+1}`;
      cell.innerHTML=`<span class="empty-hint">${esc(t("dropScene"))}</span>`;
    }
    registerDropTarget(cell,(id,from)=>{
      if(dropIntoCell(i,id,from,!!startMap[i])){ saveState(); renderEditor(); }
    });
    grid.appendChild(cell);
  }

  renderSizeBar();

  const pal=document.getElementById("palette"), act=activeSources();
  pal.replaceChildren();
  if(!act.length){ pal.innerHTML=`<div class="palette-empty">${esc(t("palEmpty"))}</div>`; return; }
  act.forEach(s=>{
    const chip=document.createElement("div");
    chip.className="chip"+(cells.includes(s.id)?" used":"");
    chip.innerHTML=`<span class="cdot" style="background:${typeColor(s.type)}"></span>${esc(s.name)}`;
    makeDragSource(chip, s.id, null);
    pal.appendChild(chip);
  });
}

/* --- ustawienia --- */
function urlHintFor(url){
  const p=detectPlatform(url);
  if(p.key==="empty") return {cls:"",     icon:"info",          text:t("urlEmpty")};
  if(p.key==="bad")   return {cls:"bad",  icon:"circle-alert",  text:t("urlUnknown")};
  if(p.key==="other") return {cls:"warn", icon:"triangle-alert",text:t("urlUnknown")};
  return {cls:"ok", icon:"check", text:t("urlOk")+": "+p.label};
}
function paintUrlHint(box, url){
  const h=urlHintFor(url);
  box.className="url-hint "+h.cls;
  box.innerHTML=ico(h.icon)+"<span>"+esc(h.text)+"</span>";
}

function switchRow(id, title, desc, checked){
  return `<div class="switch-row">
    <label class="switch"><input type="checkbox" id="${id}" ${checked?"checked":""}>
      <span class="track"></span><span class="thumb"></span></label>
    <div class="sr-main"><div class="sr-t">${esc(title)}</div><div class="sr-d">${esc(desc)}</div></div>
  </div>`;
}

    list.forEach(s=>{

             <div class="tmr-hms">
               <input data-th="h" type="number" min="0" max="99" value="${s.h||0}" aria-label="h"><span>:</span>

                 s.mode==="clock" ? "" : `<span>:</span><input data-th="s" type="number" min="0" max="59" value="${p2(s.s)}" aria-label="s">`}
             </div>
             <div class="seg tmr-mode">
               <button data-tmode="down"  aria-pressed="${(!s.mode||s.mode==='down')}">${esc(t("tmrDown"))}</button>
               <button data-tmode="up"    aria-pressed="${s.mode==='up'}">${esc(t("tmrUp"))}</button>
               <button data-tmode="clock" aria-pressed="${s.mode==='clock'}">${esc(t("tmrClock"))}</button>
             </div>
           </div>`
        : `<input class="url" data-k="url" value="${esc(s.url)}" placeholder="${esc(t("phUrl"))}"
                  spellcheck="false" aria-label="URL"${locked?" disabled":""}>
           <div class="url-hint" data-urlhint></div>`;
      html+=`<div class="src ${s.enabled?"":"disabled"}" data-id="${esc(s.id)}">
        <label class="switch"><input type="checkbox" data-k="enabled" ${s.enabled?"checked":""}
          aria-label="${esc(s.name)}"><span class="track"></span><span class="thumb"></span></label>
        <div class="src-main">
          <input class="name" data-k="name" value="${esc(s.name)}"
                 placeholder="${esc(s.type==="timer"?t("timerLabel"):t("phName"))}" aria-label="${esc(t("phName"))}"${locked?" disabled":""}>
          ${mid}
        </div>
        <label class="clr-pick" title="${esc(t("borderColor"))}">
          <input type="color" data-k="color" value="${safeColor(s.color)||'#33b5d1'}" aria-label="${esc(t("borderColor"))}">
          <span class="clr-swatch" style="background:${safeColor(s.color)||'#33b5d1'}"></span></label>
        <button class="del" data-del title="${esc(t("titleDel"))}" aria-label="${esc(t("titleDel"))}">${ico("trash-2","ico-sm")}</button>

      ${ico("trash-2","ico-sm")} ${esc(t("resetBtn"))}</button>`;

  /* --- podpięcie zdarzeń --- */
  body.querySelector("#ioExport").onclick = exportConfig;
  body.querySelector("#ioImport").onclick = ()=>document.getElementById("importFile").click();
  body.querySelector("#ioLink").onclick   = copyShareLink;

  bind("optAwake", v=>{ state.opts.keepAwake=v; saveState(); v?requestWakeLock():releaseWakeLock(); });
  bind("optLock",  v=>{ state.opts.locked=v;   saveState(); renderSettings(); });

  const bwStep=d=>{
    state.borderPx=Math.max(0,Math.min(8,(state.borderPx||0)+d)); saveState();
    const v=body.querySelector("#bwVal"); if(v) v.textContent=state.borderPx;
    tileNodes.forEach(rec=>rec.el.style.borderWidth=state.borderPx+"px");
  };
  body.querySelector("#bwDec").onclick=()=>bwStep(-1);
  body.querySelector("#bwInc").onclick=()=>bwStep(1);

  body.querySelector("#resetDefaults").onclick=()=>{
    if(!confirm(t("confirmReset"))) return;
    const l=state.lang, o=state.opts;
    state=DEFAULTS(); state.lang=l; state.opts=o;
    saveState(); renderSettings(); renderWall();
  };

  body.querySelectorAll(".src").forEach(row=>{
    const id=row.dataset.id;
    const hint=row.querySelector("[data-urlhint]");
    const urlInput=row.querySelector('input[data-k="url"]');
    if(hint && urlInput) paintUrlHint(hint, urlInput.value);

    const clr=row.querySelector('input[type="color"]');
    if(clr) clr.addEventListener("input",()=>{
      const sw=row.querySelector(".clr-swatch"); if(sw) sw.style.background=clr.value;
    });

    const del=row.querySelector("[data-del]");
    if(del) del.onclick=()=>{
      destroyTile(id);
      state.sources=state.sources.filter(s=>s.id!==id);
      if(state.layout.cells) state.layout.cells=state.layout.cells.map(c=>c===id?null:c);
      delete state.layout.sizes[id];
      saveState(); renderSettings(); renderWall();
    };

    row.querySelectorAll("[data-k]").forEach(inp=>{
      const k=inp.dataset.k, ev=inp.type==="checkbox"?"change":"input";
      inp.addEventListener(ev,()=>{
        const src=byId(id); if(!src) return;
        if(k==="enabled")     src.enabled=inp.checked;
        else if(k==="color")  src.color=safeColor(inp.value);
        else                  src[k]=inp.value;
        row.classList.toggle("disabled",!src.enabled);
        if(k==="url" && hint) paintUrlHint(hint, inp.value);
        saveState();
        // Nazwa i kolor bez przeładowania.
        if(k==="name" || k==="color"){ const rec=tileNodes.get(id); if(rec) paintTile(src, 1); }
        else renderWall();
      });
    });

    row.querySelectorAll("[data-th]").forEach(inp=>inp.addEventListener("change",()=>{
      const src=byId(id), k=inp.dataset.th;
      let v=parseInt(inp.value,10)||0;
      v=Math.max(0, k==="h"?Math.min(99,v):Math.min(59,v));
      src[k]=v; inp.value = k==="h" ? v : p2(v);
      timerReset(src); saveState(); renderWall();
    }));

    row.querySelectorAll("[data-tmode]").forEach(btn=>btn.onclick=()=>{
      const src=byId(id);
      src.mode=btn.dataset.tmode;
      if(src.mode==="clock") src.s=0;
      timerReset(src); saveState(); renderSettings(); renderWall();
    });
  });

  paintIcons();
}

/* --- presety --- */

// Klucze posortowane, żeby kolejność pól nie udawała różnicy.
function canon(v){
  if(Array.isArray(v)) return "["+v.map(canon).join(",")+"]";
  if(v && typeof v==="object")
    return "{"+Object.keys(v).sort().map(k=>JSON.stringify(k)+":"+canon(v[k])).join(",")+"}";
  return JSON.stringify(v===undefined?null:v);
}

function captureView(){
  return {
    layout : {
      mode : state.layout.mode,
      cols : state.layout.cols,
      rows : state.layout.rows,
      cells: (state.layout.cells||[]).slice(),
      order: [],
      sizes: JSON.parse(JSON.stringify(state.layout.sizes||{})),
    },
    enabled: Object.fromEntries(state.sources.map(s=>[s.id, !!s.enabled])),
  };
}
function viewSig(v){ return canon({l:v.layout, e:v.enabled}); }

function activePresetObj(){
  return state.activePreset ? state.presets.find(p=>p.id===state.activePreset) : null;
}
// Czy to, co widać, różni się od zapisanego presetu?
function presetDirty(){
  const p=activePresetObj();
  return p ? viewSig(p)!==viewSig(captureView()) : false;
}

function savePreset(name){
  if(state.presets.length>=24){ toast(t("presetLimit"), true); return null; }
  const v=captureView();
  const p={ id:"pst"+Date.now(), name:name||(t("presetDefault")+" "+(state.presets.length+1)),
            layout:v.layout, enabled:v.enabled };
  state.presets.push(p);
  state.activePreset=p.id;
  saveState(); renderPresetBar(); renderPresetList();
  toast(t("presetSaved"));
  return p;
}
function updatePreset(id){
  const p=state.presets.find(x=>x.id===id); if(!p) return;
  const v=captureView();
  p.layout=v.layout; p.enabled=v.enabled;
  state.activePreset=id;
  saveState(); renderPresetBar(); renderPresetList();
  toast(t("presetUpdated"));
}
function deletePreset(id){
  if(!confirm(t("confirmDelPreset"))) return;
  state.presets=state.presets.filter(p=>p.id!==id);
  if(state.activePreset===id) state.activePreset=null;
  saveState(); renderPresetBar(); renderPresetList();
  toast(t("presetDeleted"));
}
function movePreset(id, dir){
  const i=state.presets.findIndex(p=>p.id===id);
  const j=i+dir;
  if(i<0 || j<0 || j>=state.presets.length) return;
  const [p]=state.presets.splice(i,1);
  state.presets.splice(j,0,p);
  saveState(); renderPresetBar(); renderPresetList();
}

function applyPreset(id){
  const p=state.presets.find(x=>x.id===id); if(!p) return;
  state.layout = {
    mode : p.layout.mode,
    cols : p.layout.cols,
    rows : p.layout.rows,
    cells: (p.layout.cells||[]).slice(),
    order: [],
    sizes: JSON.parse(JSON.stringify(p.layout.sizes||{})),
  };
  state.sources.forEach(s=>{ if(s.id in (p.enabled||{})) s.enabled=!!p.enabled[s.id]; });
  state.activePreset=id;
  editWall=false;
  saveState();
  renderWall();
  renderPresetList();
  renderSettingsIfOpen();
  if(document.getElementById("layoutDrawer").classList.contains("show")) renderEditor();
}
function applyPresetByIndex(n){
  const p=state.presets[n-1];
  if(p) applyPreset(p.id);
}

/* ---------- pasek presetów pod nagłówkiem ---------- */
function renderPresetBar(){
  const bar=document.getElementById("presetbar");
  if(!bar) return;
  if(!state.presets.length){ bar.hidden=true; return; }
  bar.hidden=false;
  const dirty=presetDirty();
  bar.replaceChildren();

  state.presets.forEach((p,i)=>{
    const on = p.id===state.activePreset;
    const b=document.createElement("button");
    b.className="pchip"+(on?" on":"")+(on&&dirty?" dirty":"");
    b.title = on&&dirty ? t("presetDirtyTitle") : t("applyPreset");
    b.setAttribute("aria-pressed", String(on));
    b.innerHTML=`<span class="pnum">${i+1}</span><span class="pname"></span>`
      + (on&&dirty ? `<span class="pdot" aria-hidden="true"></span>` : "");
    b.querySelector(".pname").textContent=p.name;
    b.onclick=()=>applyPreset(p.id);
    bar.appendChild(b);
  });

  const add=document.createElement("button");
  add.className="padd";
  add.title=t("savePreset");
  add.setAttribute("aria-label",t("savePreset"));
  add.innerHTML=ico("plus","ico-sm");
  add.onclick=()=>savePreset();
  bar.appendChild(add);

  if(dirty){
    const tag=document.createElement("span");
    tag.className="pdirty";
    tag.title=t("presetDirtyTitle");
    tag.textContent=t("presetDirty");
    bar.appendChild(tag);
  }
}

/* ---------- zarządzanie presetami w szufladzie układu ---------- */
function renderPresetList(){
  const box=document.getElementById("presetList");
  if(!box) return;
  box.replaceChildren();

  if(!state.presets.length){
    const e=document.createElement("div");
    e.className="pset-empty";
    e.textContent=t("noPresets");
    box.appendChild(e);
    return;
  }
  const dirty=presetDirty();
  state.presets.forEach((p,i)=>{
    const on=p.id===state.activePreset;
    const row=document.createElement("div");
    row.className="pset"+(on?" on":"");
    row.innerHTML=`
      <button class="pset-apply" title="${esc(t("applyPreset"))}"><span class="pset-num">${i+1}</span></button>
      <input class="pset-name" value="${esc(p.name)}" placeholder="${esc(t("presetNamePh"))}" aria-label="${esc(t("presetNamePh"))}">
      ${on&&dirty?`<span class="pset-flag" title="${esc(t("presetDirtyTitle"))}">${t("presetDirty")}</span>`:""}
      <button class="pset-btn" data-p="up"   title="${esc(t("moveUp"))}"   aria-label="${esc(t("moveUp"))}">${ico("chevron-up","ico-sm")}</button>
      <button class="pset-btn" data-p="down" title="${esc(t("moveDown"))}" aria-label="${esc(t("moveDown"))}">${ico("chevron-down","ico-sm")}</button>
      <button class="pset-btn" data-p="save" title="${esc(t("updatePreset"))}" aria-label="${esc(t("updatePreset"))}">${ico("save","ico-sm")}</button>
      <button class="pset-btn del" data-p="del" title="${esc(t("deletePreset"))}" aria-label="${esc(t("deletePreset"))}">${ico("trash-2","ico-sm")}</button>`;
    row.querySelector(".pset-apply").onclick=()=>applyPreset(p.id);
    const nameInput=row.querySelector(".pset-name");
    nameInput.addEventListener("input",()=>{ p.name=nameInput.value; saveState(); renderPresetBar(); });
    row.querySelector('[data-p="up"]').onclick   =()=>movePreset(p.id,-1);
    row.querySelector('[data-p="down"]').onclick =()=>movePreset(p.id, 1);
    row.querySelector('[data-p="save"]').onclick =()=>updatePreset(p.id);
    row.querySelector('[data-p="del"]').onclick  =()=>deletePreset(p.id);
    box.appendChild(row);
  });
  paintIcons();
}

/* --- eksport / import --- */
function b64encode(str){
  const bytes=new TextEncoder().encode(str);
  let bin=""; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function b64decode(s){
  const b=s.replace(/-/g,"+").replace(/_/g,"/");
  const bin=atob(b+"=".repeat((4-b.length%4)%4));
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function exportConfig(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  const stamp=new Date().toISOString().slice(0,10);
  a.href=URL.createObjectURL(blob);
  a.download=`multiview-${stamp}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast(t("exported"));
}

function applyImported(raw){
  state=sanitizeState(raw);
  saveState();
  tileNodes.forEach((r,id)=>destroyTile(id));
  activeAudioId=null; editWall=false;
  applyI18n(); renderWall(); renderSettings();
}

function copyShareLink(){
  const url=location.origin+location.pathname+"#cfg="+b64encode(JSON.stringify(state));
  const done =()=>toast(t("linkCopied"));
  const fail =()=>{ window.prompt(t("copyLink"), url); };
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done, fail);
  else fail();
}

function maybeLoadFromHash(){
  const h=location.hash||"";
  if(!h.startsWith("#cfg=")) return;
  let raw=null;
  try{ raw=JSON.parse(b64decode(h.slice(5))); }
  catch(e){ toast(t("importErr"), true); history.replaceState(null,"",location.pathname); return; }
  history.replaceState(null,"",location.pathname);
  if(!confirm(t("confirmLoadShared"))) return;
  applyImported(raw);
  toast(t("sharedLoaded"));
}

/* --- wake lock --- */
async function requestWakeLock(){
  if(!state.opts.keepAwake || !("wakeLock" in navigator)) return;
  try{
    wakeLock=await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release",()=>{ wakeLock=null; });
  }catch(e){ /* np. brak zgody albo bateria — nic się nie dzieje */ }
}
function releaseWakeLock(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; } }
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible" && !wakeLock) requestWakeLock();
});

/* --- szuflady i język --- */
function openDrawer(el){
  document.getElementById("scrim").classList.add("show");
  el.classList.add("show");
  el.setAttribute("aria-hidden","false");
}
function closeDrawers(){
  document.getElementById("scrim").classList.remove("show");
  document.querySelectorAll(".drawer").forEach(d=>{
    d.classList.remove("show"); d.setAttribute("aria-hidden","true");
  });
}

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{ el.title=t(el.dataset.i18nTitle); });
  document.querySelectorAll("[data-i18n-aria]").forEach(el=>{ el.setAttribute("aria-label",t(el.dataset.i18nAria)); });
  document.documentElement.lang=state.lang;
  document.querySelectorAll("#langseg button").forEach(b=>
    b.setAttribute("aria-pressed", String(b.dataset.lang===state.lang)));
  tick();
}
function setLang(l){
  if(state.lang===l) return;
  state.lang=l; saveState(); applyI18n();
  renderSettingsIfOpen();
  if(document.getElementById("layoutDrawer").classList.contains("show")) renderEditor();
  if(document.getElementById("helpDrawer").classList.contains("show"))   renderHelp();
  const ab=document.getElementById("audiobar"); if(ab && !ab.hidden) renderAudioPanel();
  renderPresetBar(); renderPresetList();
  tileNodes.forEach((rec,id)=>{ const s=byId(id); if(s) paintTile(s,1); });
  if(!state.sources.some(s=>s.enabled)) renderWall();
}

function toggleFullWall(){
  const el=document.documentElement;
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  else if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
}
function reloadAll(){ tileNodes.forEach((rec,id)=>{ if(rec.iframe) reloadTile(id); }); }

// Numer jak w prawym dolnym rogu kafelka.
function soloByIndex(n){
  const ids=[...tileNodes.keys()].filter(id=>tileNodes.get(id).iframe);
  const id=ids[n-1];
  if(id) setSolo(id);
}
// Fullscreen kafelka po numerze z rogu. Liczymy wszystkie kafelki w kolejności
// siatki (nie tylko streamy) — na pełny ekran ma sens też timer czy demo.
function fullscreenTileByIndex(n){
  const el=[...document.getElementById("wall").querySelectorAll(".tile")][n-1];
  if(!el) return;
  if(document.fullscreenElement===el){ document.exitFullscreen().catch(()=>{}); return; }
  const go=()=>{ if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); };
  if(document.fullscreenElement) document.exitFullscreen().then(go).catch(go); else go();
}

/* --- skróty --- */
const IS_MAC = /Mac|iPhone|iPad|iPod/i.test(
  (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || navigator.userAgent || "");

// Symbole modyfikatorów do wyświetlenia w instrukcji.
const MOD = IS_MAC
  ? {shift:"\u21e7", combo:"\u2318\u2325", alt:"\u2325", esc:"\u238b", sep:""}
  : {shift:"Shift",  combo:"Ctrl+Alt",       alt:"Alt",     esc:"Esc",     sep:" + "};
const kbdShift = k => MOD.shift + MOD.sep + k;

function keyInfo(e){
  const code=e.code||"";
  let digit=null, letter=null;
  const md=/^(?:Digit|Numpad)([0-9])$/.exec(code);          // działa też na klawiaturze numerycznej
  if(md) digit=parseInt(md[1],10);
  const ml=/^Key([A-Z])$/.exec(code);
  if(ml) letter=ml[1].toLowerCase();
  if(digit===null && letter===null && e.key){               // awaryjnie, gdy brak e.code
    if(/^[0-9]$/.test(e.key)) digit=parseInt(e.key,10);
    else if(/^[a-zA-Z]$/.test(e.key)) letter=e.key.toLowerCase();
  }
  const combo = IS_MAC ? (e.metaKey && e.altKey && !e.ctrlKey)
                       : (e.ctrlKey && e.altKey && !e.metaKey);
  // sam Alt/Option, bez drugiego modyfikatora — to nie jest nasza kombinacja "combo"
  const alt   = e.altKey && !e.metaKey && !e.ctrlKey && !e.shiftKey;
  const bare  = !e.metaKey && !e.ctrlKey && !e.altKey;
  return {code, digit, letter, combo, bare, alt, shift:e.shiftKey};
}

const KEY_ACTIONS={
  a: ()=>toggleAudioBar(),
  l: ()=>{ renderEditor();   openDrawer(document.getElementById("layoutDrawer")); },
  s: ()=>{ renderSettings(); openDrawer(document.getElementById("settingsDrawer")); },
  h: ()=>{ renderHelp();     openDrawer(document.getElementById("helpDrawer")); },
  r: reloadAll,
  f: toggleFullWall,
};

function installShortcuts(){
  document.addEventListener("keydown", e=>{
    if(e.key==="Escape"){
      if(document.fullscreenElement) return;   // pełny ekran zamyka sama przeglądarka
      closeDrawers();
      return;
    }
    const el=e.target;
    if(el && (el.tagName==="INPUT" || el.tagName==="TEXTAREA" || el.isContentEditable)) return;

    const k=keyInfo(e);
    if(!k.bare && !k.combo && !k.alt) return;

    if(k.code==="Slash" && k.shift){            // "?" — na każdym układzie
      e.preventDefault(); KEY_ACTIONS.h(); return;
    }

    if(k.digit!==null){
      if(k.digit===0){ if(k.bare && !k.shift){ e.preventDefault(); muteAll(); } return; }
      // preset: ⇧cyfra albo ⌘⌥cyfra
      if((k.bare && k.shift) || k.combo){ e.preventDefault(); applyPresetByIndex(k.digit); return; }
      // fullscreen kafelka: ⌥/Alt + cyfra
      if(k.alt){ e.preventDefault(); fullscreenTileByIndex(k.digit); return; }
      // solo audio: goła cyfra
      if(k.bare && !k.shift){ e.preventDefault(); soloByIndex(k.digit); return; }
      return;
    }

    if(k.letter && KEY_ACTIONS[k.letter]){
      if(k.combo || (k.bare && !k.shift)){ e.preventDefault(); KEY_ACTIONS[k.letter](); }
    }
  });
}

/* --- zegar --- */
function tick(){
  const d=new Date();
  const hm=document.getElementById("clkHM"); if(!hm) return;
  hm.textContent=`${p2(d.getHours())}:${p2(d.getMinutes())}`;
  document.getElementById("clkS").textContent=p2(d.getSeconds());
  document.getElementById("clkDate").textContent=
    d.toLocaleDateString(state.lang==="en"?"en-GB":"pl-PL",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  state.sources.forEach(src=>{ if(src.type==="timer" && tileNodes.has(src.id)) paintTimer(src); });
}

/* --- start --- */
function boot(){
  loadState();
  maybeLoadFromHash();

  // Intro raz na przeglądarkę.
  const seen = localStorage.getItem("multiview.introSeen")==="1";
  const intro=document.getElementById("intro");
  if(!seen && state.opts.showIntro){
    document.body.classList.add("with-intro");
    intro.hidden=false;
    const hide=()=>{ intro.classList.add("gone"); localStorage.setItem("multiview.introSeen","1"); };
    const reduce=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    setTimeout(hide, reduce?1200:2900);
    document.getElementById("introSkip").onclick=hide;
    intro.addEventListener("click",hide);
  }else{
    intro.remove();
  }

  applyI18n();
  renderWall();
  renderPresetBar();
  paintIcons();

  document.getElementById("scrim").onclick=closeDrawers;
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeDrawers);
  document.querySelectorAll("#langseg button").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));

  document.getElementById("openSettings").onclick=()=>{ renderSettings(); openDrawer(document.getElementById("settingsDrawer")); };
  document.getElementById("openLayout").onclick  =()=>{ renderEditor();   openDrawer(document.getElementById("layoutDrawer")); };
  document.getElementById("openHelp").onclick    =()=>{ renderHelp();     openDrawer(document.getElementById("helpDrawer")); };
  document.getElementById("openAudio").onclick   =()=>toggleAudioBar();
  document.getElementById("reloadAll").onclick   =reloadAll;
  document.getElementById("fullWall").onclick    =toggleFullWall;
  document.getElementById("abClose").onclick     =()=>toggleAudioBar(false);
  document.getElementById("abMuteAll").onclick   =muteAll;

  const vr=document.getElementById("abVolRange");
  vr.addEventListener("input",()=>{
    state.vol=clampInt(vr.value,0,100)||0;
    document.getElementById("abVolVal").textContent=state.vol+"%";
    if(activeAudioId){
      const rec=tileNodes.get(activeAudioId);
      if(rec && rec.iframe) ytCmd(rec.iframe,"setVolume",[state.vol]);
    }
  });
  vr.addEventListener("change", saveState);

  document.getElementById("importFile").addEventListener("change", ev=>{
    const file=ev.target.files && ev.target.files[0];
    ev.target.value="";
    if(!file) return;
    const fr=new FileReader();
    fr.onload=()=>{
      try{ applyImported(JSON.parse(fr.result)); toast(t("imported")); }
      catch(e){ toast(t("importErr"), true); }
    };
    fr.onerror=()=>toast(t("importErr"), true);
    fr.readAsText(file);
  });

  document.getElementById("addStudio").onclick=()=>{
    const n=state.sources.filter(s=>s.type==="studio").length+1;
    state.sources.push({id:"cst"+Date.now(), name:t("customName")+" "+n, type:"studio",
                        url:"", enabled:true, loop:true, run:{status:"idle",startedAt:0,accumMs:0}});
    saveState(); renderSettings();
  };
  document.getElementById("addTimer").onclick=()=>{
    const n=state.sources.filter(s=>s.type==="timer").length+1;
    state.sources.push({id:"tmr"+Date.now(), name:t("timerName")+" "+n, type:"timer", mode:"down",
                        h:0, m:5, s:0, enabled:true, color:DEMO_COLORS[(n-1)%DEMO_COLORS.length],
                        run:{status:"idle",startedAt:0,accumMs:0}});
    saveState(); renderSettings(); renderWall();
  };

  document.querySelectorAll(".preset-btn").forEach(b=>b.onclick=()=>{
    state.layout.mode=b.dataset.preset;
    if(b.dataset.preset==="custom"){
      ensureCells();
      if(state.layout.cells.every(c=>!c))
        activeSources().forEach((s,i)=>{ if(i<state.layout.cells.length) state.layout.cells[i]=s.id; });
    }
    saveState(); renderEditor();
  });
  document.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.step, d=parseInt(b.dataset.d,10);
    state.layout[k]=Math.min(12,Math.max(1,(state.layout[k]||1)+d));
    ensureCells(); saveState(); renderEditor();
  });
  document.getElementById("sizeToggle").onclick=()=>{
    resizeMode=!resizeMode;
    document.getElementById("sizeToggle").setAttribute("aria-expanded",String(resizeMode));
    renderEditor();
  };
  document.getElementById("applyLayout").onclick=()=>{ saveState(); renderWall(); closeDrawers(); };
  document.getElementById("savePresetBtn").onclick=()=>{ savePreset(); renderEditor(); };
  document.getElementById("editWallBtn").onclick=()=>{
    state.layout.mode="custom";
    ensureCells();
    if(state.layout.cells.every(c=>!c))
      activeSources().forEach((s,i)=>{ if(i<state.layout.cells.length) state.layout.cells[i]=s.id; });
    editWall=true; saveState(); closeDrawers(); renderWall();
  };

  installShortcuts();
  requestWakeLock();
  setInterval(tick,1000); tick();
}

// lucide.js ma defer, więc czekamy na DOM.
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot);
else boot();
</script>
